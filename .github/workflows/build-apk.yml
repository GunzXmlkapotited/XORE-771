name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          [ -z "$ZIP_FILE" ] && echo "No ZIP" && exit 1
          unzip -o "$ZIP_FILE"
          rm -f "$ZIP_FILE"
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Buat pubspec.yaml baru dari awal
        run: |
          # Backup dulu
          cp pubspec.yaml pubspec.yaml.bak
          
          # Ekstrak nama dan deskripsi dari pubspec lama
          APP_NAME=$(grep "^name:" pubspec.yaml | head -1 | cut -d' ' -f2)
          APP_DESC=$(grep "^description:" pubspec.yaml | head -1 | cut -d' ' -f2-)
          
          # Buat pubspec.yaml baru yang BENER
          cat > pubspec.yaml << 'EOF'
name: $APP_NAME
description: $APP_DESC
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
EOF
          
          echo "✅ pubspec.yaml baru dibuat"
          cat pubspec.yaml
      
      - name: Copy dependencies dari backup
        run: |
          # Ambil dependencies dari backup (kecuali yang bermasalah)
          sed -n '/^dependencies:/,/^dev_dependencies:/p' pubspec.yaml.bak | grep -v "flutter:" | grep -v "sdk:" | grep -v "youtube_player_flutter" | grep -v "flutter_launcher_icons" >> pubspec.yaml
          sed -n '/^dev_dependencies:/,/^flutter:/p' pubspec.yaml.bak | grep -v "flutter_test" | grep -v "flutter_lints" | grep -v "flutter_launcher_icons" >> pubspec.yaml
          
          echo "✅ Dependencies ditambahkan"
      
      - name: Install dependencies & Build
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
