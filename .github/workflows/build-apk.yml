name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract ZIP
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found"
            exit 1
          fi
          unzip -o "$ZIP_FILE"
          rm -f "$ZIP_FILE"
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Fix Gradle
        run: |
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/versionCode = flutter.versionCode/versionCode = flutter.versionCode()/g' android/app/build.gradle.kts
            sed -i 's/versionName = flutter.versionName/versionName = flutter.versionName()/g' android/app/build.gradle.kts
          fi
      
      - name: Fix pubspec.yaml
        run: |
          # Hapus bagian flutter_launcher_icons
          sed -i '/flutter_launcher_icons:/,/^[a-z]/d' pubspec.yaml
          # Hapus youtube_player_flutter
          sed -i '/youtube_player_flutter:/d' pubspec.yaml
          # Hapus baris android/ios true
          sed -i '/android: true/d' pubspec.yaml
          sed -i '/ios: true/d' pubspec.yaml
          # Fix indentasi
          sed -i 's/^uses-material-design:/  uses-material-design:/' pubspec.yaml
      
      - name: Create dummy assets
        run: |
          mkdir -p assets/icon
          touch assets/icon/icon.jpg
      
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
