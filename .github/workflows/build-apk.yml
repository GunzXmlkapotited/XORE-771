name: Build APK from ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract ZIP file
        run: |
          # Cari file ZIP di repository
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ Tidak ada file ZIP ditemukan!"
            echo "📦 Upload file ZIP project Flutter kamu"
            exit 1
          fi
          
          echo "📦 Meng-extract file: $ZIP_FILE"
          unzip -q "$ZIP_FILE"
          
          # Hapus ZIP setelah extract
          rm "$ZIP_FILE"
          
          echo "✅ Extract selesai!"
          ls -la
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'  # Pakai versi spesifik yang stabil
      
      - name: Enable Flutter Web (fix)
        run: flutter config --enable-web
      
      - name: Create missing folders
        run: |
          mkdir -p assets/images assets/videos assets/icon fonts
          touch assets/images/title.png
          touch assets/images/logo.png
          touch assets/images/bokep.png
          touch assets/videos/splash.mp4
      
      - name: Clean cache
        run: |
          rm -f pubspec.lock
          flutter clean
      
      - name: Modify pubspec.yaml (downgrade youtube_player_flutter)
        run: |
          # Backup pubspec.yaml
          cp pubspec.yaml pubspec.yaml.bak
          # Ganti youtube_player_flutter ke versi kompatibel
          sed -i 's/youtube_player_flutter: ^9.1.3/youtube_player_flutter: 8.4.0/g' pubspec.yaml
          sed -i 's/youtube_player_flutter: ^9.1.0/youtube_player_flutter: 8.4.0/g' pubspec.yaml
          sed -i 's/youtube_player_flutter: ^9.0.0/youtube_player_flutter: 8.4.0/g' pubspec.yaml
          echo "✅ pubspec.yaml sudah dimodifikasi"
          cat pubspec.yaml | grep youtube_player_flutter
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
