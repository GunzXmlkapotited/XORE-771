name: Bot 24/7 UNLIMITED LIMITS - MULTI BOT

on:
  workflow_dispatch:
  schedule:
    - cron: '*/59 * * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999999
    
    steps:
      - uses: actions/checkout@v4
      
      # ============================================
      # AUTO-DETECT STORAGE UNTUK DOWNLOAD/UPLOAD
      # ============================================
      - name: Auto-Detect Storage untuk Speed Max
        run: |
          echo "=========================================="
          echo "  💾 AUTO-DETECT STORAGE  💾"
          echo "=========================================="
          
          # Deteksi storage yang tersedia
          echo "📊 DETEKSI STORAGE:"
          df -h
          echo ""
          
          # Cari storage terbesar
          STORAGE_PATH=""
          STORAGE_SIZE=""
          STORAGE_USED=""
          STORAGE_AVAIL=""
          
          # Cek storage yang tersedia
          for mount in $(df -h | awk 'NR>1 {print $6}'); do
            SIZE=$(df -h "$mount" | awk 'NR==2 {print $2}')
            AVAIL=$(df -h "$mount" | awk 'NR==2 {print $4}')
            USED=$(df -h "$mount" | awk 'NR==2 {print $5}')
            
            # Ambil storage terbesar
            if [[ "$SIZE" == *"G"* ]] || [[ "$SIZE" == *"T"* ]]; then
              NUM_SIZE=$(echo "$SIZE" | sed 's/G//' | sed 's/T//' | sed 's/,/./')
              if [[ -z "$STORAGE_PATH" ]] || [[ "$NUM_SIZE" -gt "$BEST_SIZE" ]] 2>/dev/null; then
                STORAGE_PATH="$mount"
                STORAGE_SIZE="$SIZE"
                STORAGE_USED="$USED"
                STORAGE_AVAIL="$AVAIL"
                BEST_SIZE="$NUM_SIZE"
              fi
            fi
          done
          
          # Fallback ke root
          if [ -z "$STORAGE_PATH" ]; then
            STORAGE_PATH="/"
            STORAGE_SIZE=$(df -h / | awk 'NR==2 {print $2}')
            STORAGE_USED=$(df -h / | awk 'NR==2 {print $5}')
            STORAGE_AVAIL=$(df -h / | awk 'NR==2 {print $4}')
          fi
          
          # Buat folder storage
          STORAGE_DIR="/mnt/storage"
          sudo mkdir -p "$STORAGE_DIR"
          
          # Gunakan storage terbesar untuk download/upload
          sudo mount --bind "$STORAGE_PATH" "$STORAGE_DIR" 2>/dev/null || {
            echo "⚠️ Gagal mount, menggunakan direktori lokal"
            STORAGE_DIR="."
          }
          
          # Buat folder untuk download/upload
          mkdir -p "$STORAGE_DIR/downloads" "$STORAGE_DIR/uploads" "$STORAGE_DIR/cache" "$STORAGE_DIR/data" "$STORAGE_DIR/sessions" "$STORAGE_DIR/users" "$STORAGE_DIR/logs" "$STORAGE_DIR/backup" "$STORAGE_DIR/output" "$STORAGE_DIR/temp"
          
          # Set permission
          chmod -R 777 "$STORAGE_DIR" 2>/dev/null || true
          
          # Link ke root
          ln -sf "$STORAGE_DIR/downloads" ./downloads 2>/dev/null || true
          ln -sf "$STORAGE_DIR/uploads" ./uploads 2>/dev/null || true
          ln -sf "$STORAGE_DIR/cache" ./cache 2>/dev/null || true
          ln -sf "$STORAGE_DIR/data" ./data 2>/dev/null || true
          ln -sf "$STORAGE_DIR/sessions" ./sessions 2>/dev/null || true
          ln -sf "$STORAGE_DIR/users" ./users 2>/dev/null || true
          ln -sf "$STORAGE_DIR/logs" ./logs 2>/dev/null || true
          ln -sf "$STORAGE_DIR/backup" ./backup 2>/dev/null || true
          ln -sf "$STORAGE_DIR/output" ./output 2>/dev/null || true
          
          # Set environment
          echo "STORAGE_PATH=$STORAGE_DIR" >> $GITHUB_ENV
          echo "DOWNLOAD_PATH=$STORAGE_DIR/downloads" >> $GITHUB_ENV
          echo "UPLOAD_PATH=$STORAGE_DIR/uploads" >> $GITHUB_ENV
          echo "STORAGE_SIZE=$STORAGE_SIZE" >> $GITHUB_ENV
          echo "STORAGE_AVAIL=$STORAGE_AVAIL" >> $GITHUB_ENV
          echo "STORAGE_USED=$STORAGE_USED" >> $GITHUB_ENV
          
          # Tampilkan hasil
          echo ""
          echo "✅ STORAGE DETECTED:"
          echo "  Path     : $STORAGE_DIR"
          echo "  Size     : $STORAGE_SIZE"
          echo "  Used     : $STORAGE_USED"
          echo "  Available: $STORAGE_AVAIL"
          echo ""
          echo "📁 FOLDER STORAGE:"
          ls -la "$STORAGE_DIR" 2>/dev/null || echo "  (empty)"
          echo ""
          echo "✅ STORAGE AUTO-DETECTED UNTUK DOWNLOAD/UPLOAD!"
          echo "=========================================="

      # ============================================
      # OPTIMASI NETWORK + STORAGE UNTUK SPEED MAX
      # ============================================
      - name: 🚀 Optimasi Network & Storage untuk Speed Max
        run: |
          echo "=========================================="
          echo "  🌐 OPTIMASI NETWORK + STORAGE  🌐"
          echo "=========================================="
          
          # Install tools
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            speedtest-cli \
            aria2 \
            axel \
            wget \
            curl \
            parallel \
            pigz \
            pbzip2 \
            nethogs \
            iotop \
            htop \
            screen \
            tmux \
            jq \
            bc \
            net-tools || true
          
          # Optimasi TCP
          sudo sysctl -w net.core.rmem_max=134217728 || true
          sudo sysctl -w net.core.wmem_max=134217728 || true
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 134217728" || true
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 134217728" || true
          sudo sysctl -w net.core.netdev_max_backlog=5000 || true
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr || true
          sudo sysctl -w net.ipv4.tcp_notsent_lowat=16384 || true
          sudo sysctl -w net.ipv4.tcp_mtu_probing=1 || true
          sudo sysctl -w net.ipv4.tcp_slow_start_after_idle=0 || true
          sudo sysctl -w net.ipv4.tcp_timestamps=1 || true
          sudo sysctl -w net.ipv4.tcp_sack=1 || true
          sudo sysctl -w net.ipv4.tcp_window_scaling=1 || true
          
          # Optimasi I/O untuk storage
          sudo sysctl -w vm.dirty_ratio=40 || true
          sudo sysctl -w vm.dirty_background_ratio=10 || true
          sudo sysctl -w vm.vfs_cache_pressure=50 || true
          sudo sysctl -w vm.swappiness=10 || true
          
          # DNS cepat
          echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf
          
          # Test speed
          echo ""
          echo "📊 TESTING SPEED:"
          speedtest-cli --simple 2>/dev/null || echo "⚠️ Speed test tidak tersedia"
          
          # Tampilkan info
          echo ""
          echo "📡 NETWORK INFO:"
          ip addr show | grep inet
          echo ""
          curl -s -o /dev/null -w "Google: %{http_code} - %{time_total}s\n" https://www.google.com
          curl -s -o /dev/null -w "Cloudflare: %{http_code} - %{time_total}s\n" https://1.1.1.1
          
          echo ""
          echo "✅ OPTIMASI SELESAI!"
          echo "=========================================="

      # ============================================
      # DOWNLOAD FILE KE STORAGE (SPEED MAX)
      # ============================================
      - name: ⬇️ Download Files ke Storage (Speed Max)
        run: |
          echo "=========================================="
          echo "  ⬇️ DOWNLOAD KE STORAGE  ⬇️"
          echo "=========================================="
          
          STORAGE_DIR="${{ env.STORAGE_PATH }}"
          DOWNLOAD_DIR="$STORAGE_DIR/downloads"
          
          echo "📁 Download folder: $DOWNLOAD_DIR"
          ls -la "$DOWNLOAD_DIR" 2>/dev/null || echo "  (empty)"
          echo ""
          
          # Fungsi download dengan speed max
          download_to_storage() {
            URL="$1"
            FILENAME="$2"
            DEST="$DOWNLOAD_DIR/$FILENAME"
            
            echo "📥 Download: $FILENAME -> Storage"
            
            # Gunakan aria2 (paling cepat)
            if command -v aria2c &> /dev/null; then
              aria2c -x 16 -s 16 -k 1M \
                --max-download-limit=0 \
                --console-log-level=error \
                -o "$DEST" "$URL" &
            else
              # Fallback wget
              wget --limit-rate=50M -O "$DEST" "$URL" &
            fi
            
            PID=$!
            while kill -0 $PID 2>/dev/null; do
              echo -n "."
              sleep 3
            done
            echo " ✅ Selesai!"
            
            # Tampilkan hasil
            ls -lh "$DEST" 2>/dev/null || echo "File: $FILENAME"
          }
          
          # ========== CONTOH DOWNLOAD ==========
          # Ganti URL sesuai kebutuhan
          # download_to_storage "https://example.com/file.zip" "file.zip"
          
          # Download semua dari file list
          if [ -f "download_list.txt" ]; then
            echo "📥 Download dari list:"
            cat download_list.txt | while read URL FILENAME; do
              download_to_storage "$URL" "$FILENAME"
            done
          fi
          
          echo ""
          echo "✅ DOWNLOAD KE STORAGE SELESAI!"
          echo "📊 Storage usage:"
          df -h "$STORAGE_DIR"
          echo "=========================================="

      # ============================================
      # UPLOAD FILE DARI STORAGE (SPEED MAX)
      # ============================================
      - name: ⬆️ Upload File dari Storage (Speed Max)
        run: |
          echo "=========================================="
          echo "  ⬆️ UPLOAD DARI STORAGE  ⬆️"
          echo "=========================================="
          
          STORAGE_DIR="${{ env.STORAGE_PATH }}"
          UPLOAD_DIR="$STORAGE_DIR/uploads"
          
          echo "📁 Upload folder: $UPLOAD_DIR"
          ls -la "$UPLOAD_DIR" 2>/dev/null || echo "  (empty)"
          echo ""
          
          # Fungsi upload dari storage
          upload_from_storage() {
            FILENAME="$1"
            TARGET_URL="$2"
            FILE_PATH="$UPLOAD_DIR/$FILENAME"
            
            if [ ! -f "$FILE_PATH" ]; then
              echo "⚠️ File tidak ditemukan: $FILENAME"
              return 1
            fi
            
            echo "📤 Upload: $FILENAME dari Storage"
            
            # Upload dengan curl
            curl -X POST \
              --limit-rate 50M \
              -F "file=@$FILE_PATH" \
              "$TARGET_URL" &
            
            PID=$!
            while kill -0 $PID 2>/dev/null; do
              echo -n "."
              sleep 3
            done
            echo " ✅ Upload selesai!"
          }
          
          # Upload semua file di storage
          upload_all_from_storage() {
            echo "📤 Upload semua file dari storage..."
            
            for file in "$UPLOAD_DIR"/*; do
              if [ -f "$file" ]; then
                FILENAME=$(basename "$file")
                echo "📤 Uploading: $FILENAME"
                # upload_from_storage "$FILENAME" "https://tujuan.com/upload"
              fi
            done
          }
          
          # ========== CONTOH UPLOAD ==========
          # Ganti URL tujuan upload
          # upload_from_storage "file.zip" "https://tujuan.com/upload"
          
          echo ""
          echo "✅ UPLOAD DARI STORAGE SELESAI!"
          echo "📊 Storage usage:"
          df -h "$STORAGE_DIR"
          echo "=========================================="

      # ============================================
      # MONITOR STORAGE AUTO-RESTART JIKA PENUH
      # ============================================
      - name: Monitor Storage - Auto Restart if Full
        run: |
          echo "=========================================="
          echo "  📊 MONITOR STORAGE  📊"
          echo "=========================================="
          
          STORAGE_DIR="${{ env.STORAGE_PATH }}"
          THRESHOLD=95
          
          # Cek storage
          check_storage() {
            if [ -d "$STORAGE_DIR" ]; then
              USAGE=$(df "$STORAGE_DIR" | awk 'NR==2 {print $5}' | sed 's/%//')
              TOTAL=$(df -h "$STORAGE_DIR" | awk 'NR==2 {print $2}')
              USED=$(df -h "$STORAGE_DIR" | awk 'NR==2 {print $3}')
              AVAIL=$(df -h "$STORAGE_DIR" | awk 'NR==2 {print $4}')
            else
              USAGE=$(df . | awk 'NR==2 {print $5}' | sed 's/%//')
              TOTAL=$(df -h . | awk 'NR==2 {print $2}')
              USED=$(df -h . | awk 'NR==2 {print $3}')
              AVAIL=$(df -h . | awk 'NR==2 {print $4}')
            fi
            
            echo "📊 STORAGE STATUS:"
            echo "  Total   : $TOTAL"
            echo "  Used    : $USED ($USAGE%)"
            echo "  Available: $AVAIL"
            echo "  Threshold: $THRESHOLD%"
            
            if [ "$USAGE" -ge "$THRESHOLD" ]; then
              echo ""
              echo "=========================================="
              echo "  ⚠️ STORAGE PENUH! $USAGE% >= $THRESHOLD%"
              echo "  🔄 AUTO-RESTART TRIGGERED!"
              echo "=========================================="
              return 1
            else
              echo "✅ Storage aman: $USAGE% < $THRESHOLD%"
              return 0
            fi
          }
          
          check_storage
          
          # Jika storage penuh, trigger restart
          if [ $? -eq 1 ]; then
            echo "🔄 Triggering restart workflow..."
            
            # Backup dulu
            echo "📦 Creating backup before restart..."
            BACKUP_DIR="$STORAGE_DIR/backup/backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp -r ./* "$BACKUP_DIR/" 2>/dev/null || true
            
            # Trigger workflow baru
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
              -d '{"ref":"${{ github.ref_name }}"}'
            
            echo "✅ New workflow triggered!"
            exit 1
          fi
          
          echo "=========================================="

      # ============================================
      # SETUP FAKE VPS
      # ============================================
      - name: Setup Fake VPS Specs
        run: |
          echo "=== FAKE VPS SPECS ==="
          
          # Fake CPU
          cat > /tmp/fake_cpuinfo << 'EOF'
          processor       : 0
          vendor_id       : GenuineIntel
          cpu family      : 6
          model           : 85
          model name      : Intel(R) Xeon(R) Platinum 8380 CPU @ 3.70GHz
          stepping        : 7
          microcode       : 0x1
          cpu MHz         : 3700.000
          cache size      : 49152 KB
          physical id     : 0
          siblings        : 128
          core id         : 0
          cpu cores       : 128
          apicid          : 0
          initial apicid  : 0
          fpu             : yes
          fpu_exception   : yes
          cpuid level     : 27
          wp              : yes
          flags           : fpu vme de pse tsc msr pae mce cx8 apic sep mtrr pge mca cmov pat pse36 clflush mmx fxsr sse sse2 ss ht syscall nx pdpe1gb rdtscp lm constant_tsc arch_perfmon rep_good nopl xtopology cpuid tsc_known_freq pni pclmulqdq ssse3 fma cx16 pcid sse4_1 sse4_2 x2apic movbe popcnt aes xsave avx f16c rdrand hypervisor lahf_lm abm 3dnowprefetch cpuid_fault invpcid_single pti ssbd ibrs ibpb stibp fsgsbase bmi1 avx2 smep bmi2 erms invpcid avx512f avx512dq rdseed adx smap avx512ifma clflushopt clwb avx512cd sha_ni avx512bw avx512vl xsaveopt xsavec xgetbv1 xsaves arat avx512vbmi umip pku ospke avx512_vbmi2 gfni vaes vpclmulqdq avx512_vnni avx512_bitalg avx512_vpopcntdq rdpid
          bugs            : cpu_meltdown spectre_v1 spectre_v2 spec_store_bypass l1tf mds swapgs itlb_multihit mmio_stale_data
          bogomips        : 7400.00
          clflush size    : 64
          cache_alignment : 64
          address sizes   : 46 bits physical, 48 bits virtual
          power management:
          EOF
          
          sudo mount --bind /tmp/fake_cpuinfo /proc/cpuinfo 2>/dev/null || true
          
          # Tampilkan specs
          echo ""
          echo "=========================================="
          echo "  🚀 VPS SPESIFIKASI  🚀"
          echo "=========================================="
          echo "CPU Model    : Intel Xeon Platinum 8380"
          echo "CPU Speed    : 3.7 GHz (Turbo: 4.0 GHz)"
          echo "CPU Cores    : 128 Core / 256 Threads"
          echo "RAM          : 256 GB DDR5 ECC"
          echo "Storage      : ${{ env.STORAGE_SIZE }}"
          echo "Storage Used : ${{ env.STORAGE_USED }}"
          echo "Storage Avail: ${{ env.STORAGE_AVAIL }}"
          echo "VPS Type     : AWS EC2 c6a.metal"
          echo "Network      : 100 Gbps"
          echo "=========================================="
          echo ""

      - name: Setup SSH Server
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server net-tools curl jq zip unzip tree || true
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null

      - name: Display SSH Access Info
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          ROOT_PASSWORD=$(openssl rand -base64 32 | head -c 20)
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          echo ""
          echo "=========================================="
          echo "  🖥️  VPS TERBAIK - SSH ACTIVE  🖥️"
          echo "=========================================="
          echo ""
          echo "📊 SPESIFIKASI:"
          echo "  CPU    : Intel Xeon Platinum 8380 @ 3.7GHz"
          echo "  Cores  : 128 Core / 256 Threads"
          echo "  RAM    : 256 GB DDR5 ECC"
          echo "  Storage : ${{ env.STORAGE_SIZE }} (${{ env.STORAGE_AVAIL }} available)"
          echo "  Network : 100 Gbps"
          echo ""
          echo "🔑 SSH ACCESS:"
          echo "  IP Address   : $PUBLIC_IP"
          echo "  Port         : 22"
          echo "  Username     : root"
          echo "  Password     : $ROOT_PASSWORD"
          echo ""
          echo "  ssh root@$PUBLIC_IP"
          echo ""
          echo "=========================================="
          echo ""
          echo "$PUBLIC_IP" > ~/ssh_ip.txt
          echo "$ROOT_PASSWORD" > ~/ssh_pass.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          echo "=== INSTALL DEPENDENCIES ==="
          npm install -g pm2
          
          for bot_dir in */; do
            if [ -f "${bot_dir}package.json" ]; then
              echo "📦 Installing: ${bot_dir}"
              cd "$bot_dir"
              npm install --no-audit --no-fund || npm install --legacy-peer-deps --no-audit --no-fund || true
              cd ..
            fi
          done

      # ============================================
      # BOT SYSTEM DENGAN STORAGE AUTO-DETECT
      # ============================================
      - name: Create Bot System with Auto-Detect Storage
        run: |
          cat > bot_system.sh << 'BOTSYSTEM'
          #!/bin/bash
          
          # Configuration
          RESTART_INTERVAL=21600  # 6 jam
          STORAGE_THRESHOLD=95    # 95% restart otomatis
          
          # Colors
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          PURPLE='\033[0;35m'
          CYAN='\033[0;36m'
          NC='\033[0m'
          
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 BOT SYSTEM - STORAGE AUTO-DETECT 🚀${NC}"
          echo -e "${PURPLE}========================================${NC}"
          
          # Auto-detect storage
          detect_storage() {
            echo "📊 Auto-detect storage..."
            
            # Cari storage terbesar
            STORAGE_PATH=""
            BEST_SIZE=0
            
            for mount in $(df -h | awk 'NR>1 {print $6}'); do
              SIZE=$(df -h "$mount" | awk 'NR==2 {print $2}')
              if [[ "$SIZE" == *"G"* ]] || [[ "$SIZE" == *"T"* ]]; then
                NUM_SIZE=$(echo "$SIZE" | sed 's/G//' | sed 's/T//' | sed 's/,/./' | cut -d. -f1)
                if [ -z "$NUM_SIZE" ]; then continue; fi
                if [ "$NUM_SIZE" -gt "$BEST_SIZE" ] 2>/dev/null; then
                  STORAGE_PATH="$mount"
                  BEST_SIZE="$NUM_SIZE"
                  STORAGE_SIZE="$SIZE"
                fi
              fi
            done
            
            # Fallback ke root
            if [ -z "$STORAGE_PATH" ]; then
              STORAGE_PATH="/"
              STORAGE_SIZE=$(df -h / | awk 'NR==2 {print $2}')
            fi
            
            STORAGE_USED=$(df -h "$STORAGE_PATH" | awk 'NR==2 {print $5}')
            STORAGE_AVAIL=$(df -h "$STORAGE_PATH" | awk 'NR==2 {print $4}')
            
            echo "  Storage Path: $STORAGE_PATH"
            echo "  Size: $STORAGE_SIZE"
            echo "  Used: $STORAGE_USED"
            echo "  Available: $STORAGE_AVAIL"
            
            export STORAGE_PATH
            export STORAGE_SIZE
            export STORAGE_USED
            export STORAGE_AVAIL
          }
          
          detect_storage
          
          # ============================================
          # FUNCTION CHECK STORAGE
          # ============================================
          check_storage() {
            echo -e "${BLUE}[$(date)] Checking storage...${NC}"
            
            if [ -d "$STORAGE_PATH" ]; then
              USAGE=$(df "$STORAGE_PATH" | awk 'NR==2 {print $5}' | sed 's/%//')
              TOTAL=$(df -h "$STORAGE_PATH" | awk 'NR==2 {print $2}')
              USED=$(df -h "$STORAGE_PATH" | awk 'NR==2 {print $3}')
              AVAIL=$(df -h "$STORAGE_PATH" | awk 'NR==2 {print $4}')
            else
              USAGE=$(df . | awk 'NR==2 {print $5}' | sed 's/%//')
              TOTAL=$(df -h . | awk 'NR==2 {print $2}')
              USED=$(df -h . | awk 'NR==2 {print $3}')
              AVAIL=$(df -h . | awk 'NR==2 {print $4}')
            fi
            
            echo "  Total   : $TOTAL"
            echo "  Used    : $USED ($USAGE%)"
            echo "  Available: $AVAIL"
            echo "  Threshold: $STORAGE_THRESHOLD%"
            
            if [ "$USAGE" -ge "$STORAGE_THRESHOLD" ]; then
              echo -e "${RED}⚠️ STORAGE PENUH! $USAGE% >= $STORAGE_THRESHOLD%${NC}"
              echo -e "${YELLOW}🔄 AUTO-RESTART TRIGGERED!${NC}"
              return 1
            else
              echo -e "${GREEN}✅ Storage aman: $USAGE% < $STORAGE_THRESHOLD%${NC}"
              return 0
            fi
          }
          
          # ============================================
          # CREATE FAKE DEVICE
          # ============================================
          cat > fake-device.js << 'FAKEJS'
          module.exports = {
            getDeviceInfo: () => ({
              model: "SM-S918B",
              manufacturer: "samsung",
              androidVersion: "14",
              vpsModel: "Intel Xeon Platinum 8380",
              vpsSpeed: "3.70 GHz",
              vpsCores: 128,
              vpsRAM: "256 GB",
              vpsStorage: process.env.STORAGE_SIZE || "Auto-Detect"
            }),
            getVPSInfo: () => ({
              cpu: "Intel(R) Xeon(R) Platinum 8380 CPU @ 3.70GHz",
              speed: "3700 MHz",
              cores: 128,
              threads: 256,
              ram: "256 GB DDR5 ECC",
              storage: process.env.STORAGE_SIZE || "Auto-Detect",
              network: "100 Gbps",
              type: "AWS EC2 c6a.metal"
            }),
            getIMEI: () => "35" + Math.random().toString(36).substring(2, 15),
            getMAC: () => "02:" + Array(5).fill().map(() => Math.random().toString(16).slice(-2)).join(":"),
            getUserAgent: () => {
              const uas = [
                "Mozilla/5.0 (Linux; Android 14; SM-S918B) AppleWebKit/537.36 Chrome/120.0.6099.210 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 13; SM-G998B) AppleWebKit/537.36 Chrome/119.0.6045.163 Mobile Safari/537.36"
              ];
              return uas[Math.floor(Math.random() * uas.length)];
            }
          };
          FAKEJS
          
          # ============================================
          # FUNCTION START BOTS
          # ============================================
          start_bots() {
            echo -e "${GREEN}[$(date)] Starting bots...${NC}"
            
            export NODE_OPTIONS="--max-old-space-size=12288"
            unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION
            
            PIDS=""
            BOT_COUNT=0
            
            for bot_dir in */; do
              if [[ "$bot_dir" == backup_* ]] || [[ "$bot_dir" == .* ]] || [[ "$bot_dir" == storage ]]; then
                continue
              fi
              
              MAIN_FILE=""
              if [ -f "${bot_dir}package.json" ]; then
                cd "$bot_dir"
                MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
                if [ -z "$MAIN_FILE" ] || [ ! -f "$MAIN_FILE" ]; then
                  for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                    if [ -f "$possible" ]; then
                      MAIN_FILE="$possible"
                      break
                    fi
                  done
                fi
                cd ..
              else
                for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                  if [ -f "${bot_dir}$possible" ]; then
                    MAIN_FILE="$possible"
                    break
                  fi
                done
              fi
              
              if [ -n "$MAIN_FILE" ]; then
                BOT_COUNT=$((BOT_COUNT + 1))
                export FAKE_IMEI="35$(openssl rand -hex 12 | head -c 13)"
                export FAKE_MAC="02:$(openssl rand -hex 6 | sed 's/\(..\)/\1:/g' | cut -d: -f1-5):$(openssl rand -hex 2 | head -c 2)"
                
                echo -e "${CYAN}[BOT $BOT_COUNT] Starting: ${bot_dir} - $MAIN_FILE${NC}"
                
                cd "$bot_dir"
                node -r ../fake-device.js "$MAIN_FILE" &
                PID=$!
                PIDS="$PIDS $PID"
                cd ..
              fi
            done
            
            echo "$PIDS" > ~/bot_pids.txt
            echo -e "${GREEN}[$(date)] Started $BOT_COUNT bots${NC}"
          }
          
          # ============================================
          # FUNCTION RESTART WORKFLOW
          # ============================================
          restart_workflow() {
            echo -e "${YELLOW}[$(date)] Restarting workflow...${NC}"
            
            # Backup dulu
            echo "📦 Creating backup..."
            BACKUP_DIR="backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp -r ./* "$BACKUP_DIR/" 2>/dev/null || true
            
            # Trigger workflow baru
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
              -d '{"ref":"${{ github.ref_name }}"}'
            
            echo -e "${GREEN}[$(date)] New workflow triggered${NC}"
          }
          
          # ============================================
          # FUNCTION GRACEFUL SHUTDOWN
          # ============================================
          graceful_shutdown() {
            echo -e "${YELLOW}[$(date)] Shutting down...${NC}"
            
            if [ -f ~/bot_pids.txt ]; then
              for PID in $(cat ~/bot_pids.txt); do
                kill -15 $PID 2>/dev/null || true
                sleep 1
                kill -9 $PID 2>/dev/null || true
              done
            fi
            
            echo -e "${GREEN}[$(date)] Shutdown complete${NC}"
          }
          
          # ============================================
          # MAIN EXECUTION
          # ============================================
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 BOT SYSTEM RUNNING 🚀${NC}"
          echo -e "${PURPLE}========================================${NC}"
          echo "Storage: $STORAGE_SIZE ($STORAGE_AVAIL available)"
          echo "Threshold: $STORAGE_THRESHOLD% Auto-Restart"
          echo "Start time: $(date)"
          echo ""
          
          # Start bots
          start_bots
          
          # Start timing
          START_TIME=$(date +%s)
          RESTART_COUNT=0
          
          # MAIN LOOP
          while true; do
            sleep 60
            
            CURRENT_TIME=$(date +%s)
            ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
            
            # CEK STORAGE setiap 5 menit
            if [ $((ELAPSED_TIME % 300)) -lt 60 ]; then
              if ! check_storage; then
                # Storage penuh, restart
                restart_workflow
                graceful_shutdown
                exit 0
              fi
            fi
            
            # Check if it's time to restart (6 jam)
            if [ $ELAPSED_TIME -ge $RESTART_INTERVAL ]; then
              echo -e "${YELLOW}[$(date)] 6 jam reached, restarting...${NC}"
              restart_workflow
              graceful_shutdown
              exit 0
            fi
            
            # Check bots alive
            if [ -f ~/bot_pids.txt ]; then
              for PID in $(cat ~/bot_pids.txt); do
                if ! kill -0 $PID 2>/dev/null; then
                  echo -e "${RED}[WARNING] Bot PID $PID died!${NC}"
                fi
              done
            fi
            
            # Show status every 10 minutes
            if [ $((ELAPSED_TIME % 600)) -lt 60 ]; then
              HOURS=$((ELAPSED_TIME / 3600))
              MINUTES=$(((ELAPSED_TIME % 3600) / 60))
              echo ""
              echo -e "${PURPLE}=== STATUS UPDATE ===${NC}"
              echo "Uptime: ${HOURS}h ${MINUTES}m"
              echo "Restarts: $RESTART_COUNT"
              echo "Time: $(date)"
              check_storage
              echo ""
            fi
          done
          BOTSYSTEM
          
          chmod +x bot_system.sh

      - name: Download Cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Run Bot System
        run: |
          echo "=== STARTING BOT SYSTEM ==="
          echo "Storage: Auto-Detect"
          echo "Threshold: 95% Auto-Restart"
          echo "Speed Target: 10-50 Mbps"
          echo ""
          ./bot_system.sh

      - name: Keep Workflow Alive
        run: |
          while true; do
            sleep 300
            echo "[$(date)] Workflow still running - Storage: Auto-Detect"
            
            if ! pgrep -f "bot_system.sh" > /dev/null; then
              echo "WARNING: Bot system died! Restarting..."
              ./bot_system.sh &
            fi
          done

      # ============================================
      # UPLOAD BACKUP KE ARTIFACT
      # ============================================
      - name: Upload Backup ke Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-backup-${{ github.run_id }}
          path: |
            backup_*/
            fake-device.js
            *.json
            *.db
            *.sqlite
            *.env
            *.config
            *.yml
            *.yaml
            *.txt
            *.md
            *.js
            *.sh
            data/
            sessions/
            users/
            logs/
            downloads/
            uploads/
            ~/ssh_ip.txt
            ~/ssh_pass.txt
            ~/latest_backup.txt
            ~/bot_pids.txt
          retention-days: 1
          compression-level: 9
          if-no-files-found: ignore
