name: Test Run Node.js

on:
  schedule:
    - cron: '*/60 * * * *'
  workflow_dispatch:

jobs:
  bot-with-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
      
      - name: Unzip semua file
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              echo "Extracting $zipfile..."
              unzip -o "$zipfile"
              rm -f "$zipfile"
            fi
          done
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Download Cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
      
      - name: Jalankan Bot + Tunnel
        run: |
          node index.js &
          sleep 5
          ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9
