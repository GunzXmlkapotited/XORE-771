name: Bot 24/7 UNLIMITED LIMITS - MULTI BOT

on:
  workflow_dispatch:
  schedule:
    - cron: '*/59 * * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999999
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Massive Storage (Without Swap)
        run: |
          echo "=== MEMBESARKAN STORAGE TANPA SWAP ==="
          
          # 1. Cleanup maksimal untuk free space
          echo "📦 Membersihkan disk..."
          sudo docker system prune -af 2>/dev/null || true
          sudo docker volume prune -f 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          sudo rm -rf /var/lib/docker/tmp/* 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/* 2>/dev/null || true
          sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
          sudo rm -rf /root/.cache/* 2>/dev/null || true
          sudo rm -rf /usr/share/doc/* 2>/dev/null || true
          sudo rm -rf /usr/share/man/* 2>/dev/null || true
          sudo rm -rf /usr/share/locale/* 2>/dev/null || true
          sudo rm -rf /var/log/* 2>/dev/null || true
          sudo journalctl --rotate 2>/dev/null || true
          sudo journalctl --vacuum-time=1s 2>/dev/null || true
          
          # 2. Buat storage besar via tmpfs (RAM-based)
          echo "💾 Membuat storage 10GB dari RAM..."
          sudo mkdir -p /mnt/bigstorage
          sudo mount -t tmpfs -o size=10G tmpfs /mnt/bigstorage
          sudo chmod 777 /mnt/bigstorage
          
          # 3. Buat link ke home
          ln -sf /mnt/bigstorage ~/bigstorage
          
          # 4. Setup overlay filesystem untuk menggabungkan storage
          echo "🔗 Setup overlay filesystem..."
          sudo mkdir -p /mnt/overlay/{upper,work,merged}
          sudo mount -t overlay overlay \
            -o lowerdir=/home/runner/work:/mnt/bigstorage,upperdir=/mnt/overlay/upper,workdir=/mnt/overlay/work \
            /mnt/overlay/merged
          
          # 5. Setup compress storage dengan ZRAM (tanpa swap)
          echo "🗜️ Setup ZRAM compression..."
          sudo modprobe zram
          echo 4G | sudo tee /sys/block/zram0/disksize
          sudo mkswap /dev/zram0 2>/dev/null || true
          sudo swapon /dev/zram0 -p 100 2>/dev/null || true
          
          # 6. Setup loop device untuk extra space
          echo "💿 Membuat virtual disk 5GB..."
          sudo dd if=/dev/zero of=/mnt/bigstorage/virtual_disk.img bs=1M count=5000 status=progress
          sudo mkfs.ext4 /mnt/bigstorage/virtual_disk.img
          sudo mkdir -p /mnt/virtual
          sudo mount -o loop /mnt/bigstorage/virtual_disk.img /mnt/virtual
          
          # 7. Setup squashfs untuk compress file
          echo "📦 Setup squashfs compression..."
          sudo apt-get install -y squashfs-tools
          
          # 8. Optimasi filesystem
          echo "⚡ Optimasi filesystem..."
          sudo sysctl vm.dirty_ratio=30
          sudo sysctl vm.dirty_background_ratio=10
          sudo sysctl vm.vfs_cache_pressure=50
          sudo sysctl vm.swappiness=0
          
          # 9. Tampilkan storage info
          echo ""
          echo "=========================================="
          echo "  💾 STORAGE BESAR TANPA SWAP 💾"
          echo "=========================================="
          echo "Storage Utama:"
          df -h /
          echo ""
          echo "Storage Tambahan (tmpfs 10GB):"
          df -h /mnt/bigstorage
          echo ""
          echo "Storage Virtual (5GB):"
          df -h /mnt/virtual
          echo ""
          echo "Storage Overlay:"
          df -h /mnt/overlay/merged
          echo ""
          echo "RAM Usage:"
          free -h
          echo ""
          echo "Total Storage:"
          df -h --total | grep total
          echo "=========================================="
          
          # 10. Simpan info storage ke env
          echo "STORAGE_PATH=/mnt/bigstorage" >> $GITHUB_ENV
          echo "VIRTUAL_STORAGE=/mnt/virtual" >> $GITHUB_ENV
          echo "OVERLAY_STORAGE=/mnt/overlay/merged" >> $GITHUB_ENV
          
          # 11. Setup fake storage specs
          echo "FAKE_STORAGE=10 TB NVMe SSD" >> $GITHUB_ENV
          echo "FAKE_STORAGE_TYPE=Samsung PM1735 10TB NVMe" >> $GITHUB_ENV
          
      - name: Setup Fake VPS Specs 3.7 GHz
        run: |
          # Fake CPU specs - 3.7 GHz
          echo "=== FAKE VPS SPECS ==="
          
          # Mount fake cpuinfo
          cat > /tmp/fake_cpuinfo << 'EOF'
          processor       : 0
          vendor_id       : GenuineIntel
          cpu family      : 6
          model           : 85
          model name      : Intel(R) Xeon(R) Platinum 8380 CPU @ 3.70GHz
          stepping        : 7
          cpu MHz         : 3700.000
          cache size      : 49152 KB
          physical id     : 0
          siblings        : 128
          core id         : 0
          cpu cores       : 128
          apicid          : 0
          initial apicid  : 0
          fpu             : yes
          fpu_exception   : yes
          cpuid level     : 27
          wp              : yes
          flags           : fpu vme de pse tsc msr pae mce cx8 apic sep mtrr pge mca cmov pat pse36 clflush mmx fxsr sse sse2 ss ht syscall nx pdpe1gb rdtscp lm constant_tsc arch_perfmon rep_good nopl xtopology cpuid tsc_known_freq pni pclmulqdq ssse3 fma cx16 pcid sse4_1 sse4_2 x2apic movbe popcnt aes xsave avx f16c rdrand hypervisor lahf_lm abm 3dnowprefetch cpuid_fault invpcid_single pti ssbd ibrs ibpb stibp fsgsbase bmi1 avx2 smep bmi2 erms invpcid avx512f avx512dq rdseed adx smap avx512ifma clflushopt clwb avx512cd sha_ni avx512bw avx512vl xsaveopt xsavec xgetbv1 xsaves arat avx512vbmi umip pku ospke avx512_vbmi2 gfni vaes vpclmulqdq avx512_vnni avx512_bitalg avx512_vpopcntdq rdpid
          bugs            : cpu_meltdown spectre_v1 spectre_v2 spec_store_bypass l1tf mds swapgs itlb_multihit mmio_stale_data
          bogomips        : 7400.00
          clflush size    : 64
          cache_alignment : 64
          address sizes   : 46 bits physical, 48 bits virtual
          power management:
          EOF
          
          sudo mount --bind /tmp/fake_cpuinfo /proc/cpuinfo 2>/dev/null || true
          
          # Set environment variables
          echo "FAKE_CPU_MODEL=Intel Xeon Platinum 8380 @ 3.70GHz" >> $GITHUB_ENV
          echo "FAKE_CPU_SPEED=3700" >> $GITHUB_ENV
          echo "FAKE_VPS_TYPE=AWS EC2 c6a.metal - 128 vCPUs" >> $GITHUB_ENV
          echo "FAKE_RAM=256GB DDR5 ECC" >> $GITHUB_ENV
          echo "FAKE_STORAGE=10 TB NVMe SSD" >> $GITHUB_ENV
          
          # Show specs
          echo ""
          echo "=========================================="
          echo "  🚀 VPS SPESIFIKASI TERBAIK DUNIA 🚀"
          echo "=========================================="
          echo "CPU Model    : Intel Xeon Platinum 8380"
          echo "CPU Speed    : 3.7 GHz (Turbo: 4.0 GHz)"
          echo "CPU Cores    : 128 Core / 256 Threads"
          echo "RAM          : 256 GB DDR5 ECC"
          echo "Storage      : 10 TB NVMe SSD (Samsung PM1735)"
          echo "VPS Type     : AWS EC2 c6a.metal"
          echo "Network      : 100 Gbps"
          echo "=========================================="
          echo ""
          
      - name: Setup SSH Server
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server net-tools curl jq
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#Port 22/Port 22/' /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null
          
      - name: Display SSH Access Info with VPS Specs
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          ROOT_PASSWORD=$(openssl rand -base64 32 | head -c 20)
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          echo ""
          echo "=========================================="
          echo "  🖥️  VPS TERBAIK DUNIA - SSH ACTIVE  🖥️"
          echo "=========================================="
          echo ""
          echo "📊 SPESIFIKASI VPS:"
          echo "  CPU Model    : Intel Xeon Platinum 8380"
          echo "  CPU Speed    : 3.7 GHz (Turbo: 4.0 GHz)"
          echo "  CPU Cores    : 128 Core / 256 Threads"
          echo "  RAM          : 256 GB DDR5 ECC"
          echo "  Storage      : 10 TB NVMe SSD (Samsung PM1735)"
          echo "  Network      : 100 Gbps"
          echo "  VPS Type     : AWS EC2 c6a.metal"
          echo "  Location     : AWS Global (Multiple Regions)"
          echo ""
          echo "💾 STORAGE DETAIL:"
          echo "  Total        : 10 TB NVMe SSD"
          echo "  Read Speed   : 7,000 MB/s"
          echo "  Write Speed  : 5,000 MB/s"
          echo "  IOPS         : 1,000,000"
          echo ""
          echo "🔑 SSH ACCESS:"
          echo "  IP Address   : $PUBLIC_IP"
          echo "  Port         : 22"
          echo "  Username     : root"
          echo "  Password     : $ROOT_PASSWORD"
          echo ""
          echo "  ssh root@$PUBLIC_IP"
          echo ""
          echo "=========================================="
          echo ""
          echo "$PUBLIC_IP" > ~/ssh_ip.txt
          echo "$ROOT_PASSWORD" > ~/ssh_pass.txt
          
      - name: Unzip ALL Files
        run: |
          # Gunakan storage besar untuk extract
          export EXTRACT_DIR="/mnt/bigstorage/bots"
          mkdir -p "$EXTRACT_DIR"
          
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              folder_name="${zipfile%.zip}"
              echo "Extracting $zipfile to $EXTRACT_DIR/$folder_name/"
              mkdir -p "$EXTRACT_DIR/$folder_name"
              unzip -o "$zipfile" -d "$EXTRACT_DIR/$folder_name"
              # Link ke home
              ln -sf "$EXTRACT_DIR/$folder_name" "./$folder_name" 2>/dev/null || true
              rm -f "$zipfile"
            fi
          done 2>/dev/null || true
          
          echo ""
          echo "=== All bots extracted to big storage ==="
          ls -la "$EXTRACT_DIR"/
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ALL Dependencies with Big Storage
        run: |
          echo "=== Installing dependencies on big storage ==="
          npm install -g pm2
          
          # Set npm cache ke storage besar
          npm config set cache /mnt/bigstorage/npm-cache
          
          for bot_dir in */; do
            if [ -f "${bot_dir}package.json" ]; then
              echo ">>> Found package.json in: ${bot_dir}"
              cd "$bot_dir"
              # Install dengan node_modules di storage besar
              npm install --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || {
                npm install --legacy-peer-deps --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              }
              cd ..
            elif [ -f "${bot_dir}index.js" ] || [ -f "${bot_dir}app.js" ] || [ -f "${bot_dir}main.js" ]; then
              echo ">>> No package.json in ${bot_dir}, installing common deps"
              cd "$bot_dir"
              npm init -y
              npm install express axios cheerio puppeteer puppeteer-extra puppeteer-extra-plugin-stealth --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install socket.io ws discord.js telegraf node-fetch --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install request got superagent --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install moment chalk colors figlet --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install dotenv config winston --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install fs-extra path os child_process --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install crypto crypto-js jsonwebtoken bcrypt --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install qrcode sharp jimp --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install mongoose mysql2 sqlite3 redis --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              npm install compression helmet cors body-parser --no-audit --no-fund --cache /mnt/bigstorage/npm-cache || true
              cd ..
            fi
          done
          
          # Show storage usage after install
          echo ""
          echo "=== Storage Usage After Install ==="
          df -h /mnt/bigstorage
          du -sh /mnt/bigstorage/*
          
      - name: Create Complete Bot System with Auto-Restart 5:59 Hours
        run: |
          cat > bot_system.sh << 'BOTSYSTEM'
          #!/bin/bash
          
          # Configuration
          RESTART_INTERVAL=21540  # 5 jam 59 menit dalam detik
          BACKUP_INTERVAL=21540   # Sama dengan restart interval
          WORKFLOW_TRIGGER_TIME=21540  # 5:59 jam
          
          # Colors
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          PURPLE='\033[0;35m'
          CYAN='\033[0;36m'
          NC='\033[0m'
          
          # Set storage paths
          export STORAGE_PATH="/mnt/bigstorage"
          export VIRTUAL_STORAGE="/mnt/virtual"
          export OVERLAY_STORAGE="/mnt/overlay/merged"
          
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 VPS TERBAIK DUNIA - 3.7 GHz 🚀${NC}"
          echo -e "${CYAN}  💾 STORAGE 10 TB NVMe SSD 💾${NC}"
          echo -e "${PURPLE}========================================${NC}"
          echo "CPU: Intel Xeon Platinum 8380 @ 3.70GHz"
          echo "Cores: 128 Core / 256 Threads"
          echo "RAM: 256 GB DDR5 ECC"
          echo "Storage: 10 TB NVMe SSD (Samsung PM1735)"
          echo "Speed: 7,000 MB/s Read | 5,000 MB/s Write"
          echo ""
          echo -e "${BLUE}=== MULTI BOT SYSTEM 24/7 ===${NC}"
          echo "Auto-Restart: Every 5 Hours 59 Minutes"
          echo "Backup: Before each restart"
          echo "Start time: $(date)"
          echo ""
          
          # Create fake device module with VPS & Storage specs
          cat > fake-device.js << 'FAKEJS'
          const os = require('os');
          const fs = require('fs');
          
          module.exports = {
            getDeviceInfo: () => ({
              model: process.env.BUILD_MODEL || "SM-S918B",
              manufacturer: process.env.BUILD_MANUFACTURER || "samsung",
              androidVersion: process.env.BUILD_VERSION_RELEASE || "14",
              // Fake VPS specs
              vpsModel: "Intel Xeon Platinum 8380",
              vpsSpeed: "3.70 GHz",
              vpsCores: 128,
              vpsRAM: "256 GB",
              vpsStorage: "10 TB NVMe SSD"
            }),
            getVPSInfo: () => ({
              cpu: "Intel(R) Xeon(R) Platinum 8380 CPU @ 3.70GHz",
              speed: "3700 MHz",
              cores: 128,
              threads: 256,
              ram: "256 GB DDR5 ECC",
              storage: "10 TB NVMe SSD (Samsung PM1735)",
              storageSpeed: "7,000 MB/s Read | 5,000 MB/s Write",
              network: "100 Gbps",
              type: "AWS EC2 c6a.metal"
            }),
            getStorageInfo: () => {
              try {
                const stat = fs.statfsSync('/mnt/bigstorage');
                const total = stat.blocks * stat.bsize;
                const free = stat.bavail * stat.bsize;
                return {
                  total: (total / 1024 / 1024 / 1024).toFixed(2) + " GB",
                  free: (free / 1024 / 1024 / 1024).toFixed(2) + " GB",
                  used: ((total - free) / 1024 / 1024 / 1024).toFixed(2) + " GB",
                  type: "NVMe SSD",
                  speed: "7,000 MB/s Read | 5,000 MB/s Write"
                };
              } catch(e) {
                return {
                  total: "10 TB",
                  free: "9.5 TB",
                  used: "0.5 TB",
                  type: "NVMe SSD",
                  speed: "7,000 MB/s Read | 5,000 MB/s Write"
                };
              }
            },
            getIMEI: () => process.env.FAKE_IMEI || "35" + Math.random().toString(36).substring(2, 15),
            getMAC: () => process.env.FAKE_MAC || "02:" + Array(5).fill().map(() => Math.random().toString(16).slice(-2)).join(":"),
            getLocation: () => ({
              latitude: parseFloat(process.env.FAKE_LATITUDE) || -6.2 + Math.random() * 5,
              longitude: parseFloat(process.env.FAKE_LONGITUDE) || 106.8 + Math.random() * 5
            }),
            getUserAgent: () => {
              const uas = [
                "Mozilla/5.0 (Linux; Android 14; SM-S918B) AppleWebKit/537.36 Chrome/120.0.6099.210 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 13; SM-G998B) AppleWebKit/537.36 Chrome/119.0.6045.163 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro) AppleWebKit/537.36 Chrome/121.0.6167.164 Mobile Safari/537.36"
              ];
              return uas[Math.floor(Math.random() * uas.length)];
            },
            getAllFakeData: () => ({
              device: module.exports.getDeviceInfo(),
              vps: module.exports.getVPSInfo(),
              storage: module.exports.getStorageInfo(),
              imei: module.exports.getIMEI(),
              mac: module.exports.getMAC(),
              location: module.exports.getLocation(),
              userAgent: module.exports.getUserAgent(),
              timestamp: Date.now()
            })
          };
          FAKEJS
          
          # Function untuk restore data dari backup sebelumnya
          restore_from_backup() {
            echo -e "${BLUE}[$(date)] Checking for previous backup...${NC}"
            
            # Cari backup terakhir di storage besar
            LATEST_BACKUP=$(ls -td $STORAGE_PATH/backup_* 2>/dev/null | head -1)
            
            if [ -n "$LATEST_BACKUP" ]; then
              echo -e "${YELLOW}Found backup: $LATEST_BACKUP${NC}"
              echo "Restoring data..."
              
              # Restore fake-device.js
              cp "$LATEST_BACKUP/fake-device.js" . 2>/dev/null || true
              
              # Restore bot data
              for bot_dir in */; do
                if [ -d "$bot_dir" ] && [[ "$bot_dir" != backup_* ]]; then
                  if [ -d "$LATEST_BACKUP/$bot_dir" ]; then
                    echo "  Restoring: $bot_dir"
                    cp -r "$LATEST_BACKUP/$bot_dir"/* "$bot_dir"/ 2>/dev/null || true
                  fi
                fi
              done
              
              echo -e "${GREEN}[$(date)] Restore completed from: $LATEST_BACKUP${NC}"
            else
              echo "No previous backup found, starting fresh"
            fi
          }
          
          # Function untuk backup data
          backup_bot_data() {
            echo -e "${YELLOW}[$(date)] Creating backup to 10TB storage...${NC}"
            
            BACKUP_DIR="$STORAGE_PATH/backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            # Backup semua data penting
            for bot_dir in */; do
              if [ -d "$bot_dir" ] && [[ "$bot_dir" != backup_* ]]; then
                echo "  Backing up: $bot_dir"
                mkdir -p "$BACKUP_DIR/$bot_dir"
                # Copy semua file penting
                cp -r "$bot_dir"/* "$BACKUP_DIR/$bot_dir"/ 2>/dev/null || true
              fi
            done
            
            # Backup environment dan config
            cp fake-device.js "$BACKUP_DIR/" 2>/dev/null || true
            cp ~/ssh_ip.txt "$BACKUP_DIR/" 2>/dev/null || true
            cp ~/ssh_pass.txt "$BACKUP_DIR/" 2>/dev/null || true
            
            # Simpan info backup
            echo "Backup created: $(date)" > "$BACKUP_DIR/backup_info.txt"
            echo "Bots count: $(ls -d */ 2>/dev/null | wc -l)" >> "$BACKUP_DIR/backup_info.txt"
            echo "Backup number: $(ls -d $STORAGE_PATH/backup_* 2>/dev/null | wc -l)" >> "$BACKUP_DIR/backup_info.txt"
            echo "VPS: Intel Xeon Platinum 8380 @ 3.70GHz" >> "$BACKUP_DIR/backup_info.txt"
            echo "Storage: 10 TB NVMe SSD" >> "$BACKUP_DIR/backup_info.txt"
            
            echo -e "${GREEN}[$(date)] Backup completed: $BACKUP_DIR${NC}"
            echo "$BACKUP_DIR" > ~/latest_backup.txt
          }
          
          # Function untuk start semua bot
          start_all_bots() {
            echo -e "${GREEN}[$(date)] Starting all bots on 3.7 GHz VPS with 10TB storage...${NC}"
            
            export NODE_OPTIONS="--max-old-space-size=12288"
            unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
            unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
            
            PIDS=""
            BOT_COUNT=0
            
            for bot_dir in */; do
              if [[ "$bot_dir" == backup_* ]] || [[ "$bot_dir" == .* ]]; then
                continue
              fi
              
              # Detect main file
              MAIN_FILE=""
              if [ -f "${bot_dir}package.json" ]; then
                cd "$bot_dir"
                MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
                if [ -z "$MAIN_FILE" ] || [ ! -f "$MAIN_FILE" ]; then
                  for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                    if [ -f "$possible" ]; then
                      MAIN_FILE="$possible"
                      break
                    fi
                  done
                fi
                cd ..
              else
                for possible in "index.js" "app.js" "main.js" "server.js" "bot.js"; do
                  if [ -f "${bot_dir}$possible" ]; then
                    MAIN_FILE="$possible"
                    break
                  fi
                done
              fi
              
              if [ -n "$MAIN_FILE" ]; then
                BOT_COUNT=$((BOT_COUNT + 1))
                
                # Generate unique fake data
                export ANDROID_ID=$(openssl rand -hex 16)
                export GAID=$(openssl rand -hex 16)
                export FAKE_IMEI="35$(openssl rand -hex 12 | head -c 13)"
                export FAKE_MAC="02:$(openssl rand -hex 6 | sed 's/\(..\)/\1:/g' | cut -d: -f1-5):$(openssl rand -hex 2 | head -c 2)"
                export FAKE_LATITUDE="-$((RANDOM % 90)).$((RANDOM % 999999))"
                export FAKE_LONGITUDE="$((RANDOM % 180)).$((RANDOM % 999999))"
                
                echo -e "${CYAN}[BOT $BOT_COUNT] Starting: ${bot_dir} - $MAIN_FILE${NC}"
                echo "  📱 IMEI: $FAKE_IMEI"
                echo "  🔗 MAC: $FAKE_MAC"
                echo "  🚀 Running on: 3.7 GHz VPS - 10TB Storage"
                
                cd "$bot_dir"
                node -r ../fake-device.js "$MAIN_FILE" &
                PID=$!
                PIDS="$PIDS $PID"
                cd ..
              fi
            done
            
            echo "$PIDS" > ~/bot_pids.txt
            echo -e "${GREEN}[$(date)] Started $BOT_COUNT bots on 128-core VPS with 10TB storage${NC}"
            return 0
          }
          
          # Function untuk trigger workflow baru
          trigger_new_workflow() {
            echo -e "${BLUE}[$(date)] Triggering new workflow for seamless transition...${NC}"
            
            # Backup terakhir sebelum restart
            backup_bot_data
            
            # Save current state untuk workflow berikutnya
            echo "STATE_$(date +%s)" > ~/workflow_state.txt
            echo "Bots running: $(cat ~/bot_pids.txt 2>/dev/null || echo 'none')" >> ~/workflow_state.txt
            echo "Last backup: $(cat ~/latest_backup.txt 2>/dev/null || echo 'none')" >> ~/workflow_state.txt
            echo "Restart count: $RESTART_COUNT" >> ~/workflow_state.txt
            echo "VPS: 3.7 GHz Intel Xeon Platinum 8380" >> ~/workflow_state.txt
            echo "Storage: 10 TB NVMe SSD" >> ~/workflow_state.txt
            
            # Trigger workflow berikutnya via GitHub API
            echo -e "${YELLOW}Triggering new workflow via GitHub API...${NC}"
            
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/dispatches \
              -d '{"ref":"${{ github.ref_name }}"}'
            
            echo -e "${GREEN}[$(date)] New workflow triggered${NC}"
          }
          
          # Function untuk graceful shutdown
          graceful_shutdown() {
            echo -e "${YELLOW}[$(date)] Performing graceful shutdown...${NC}"
            
            # Kill all bots
            if [ -f ~/bot_pids.txt ]; then
              BOT_PIDS=$(cat ~/bot_pids.txt)
              for PID in $BOT_PIDS; do
                echo "  Stopping bot PID: $PID"
                kill -15 $PID 2>/dev/null || true
                sleep 1
                kill -9 $PID 2>/dev/null || true
              done
            fi
            
            # Kill tunnel
            if [ -f ~/tunnel_pid.txt ]; then
              TUNNEL_PID=$(cat ~/tunnel_pid.txt)
              echo "  Stopping tunnel PID: $TUNNEL_PID"
              kill -15 $TUNNEL_PID 2>/dev/null || true
              sleep 1
              kill -9 $TUNNEL_PID 2>/dev/null || true
            fi
            
            echo -e "${GREEN}[$(date)] Graceful shutdown complete${NC}"
          }
          
          # Main execution
          echo -e "${PURPLE}========================================${NC}"
          echo -e "${CYAN}  🚀 VPS TERBAIK DUNIA - 3.7 GHz 🚀${NC}"
          echo -e "${CYAN}  💾 STORAGE 10 TB NVMe SSD 💾${NC}"
          echo -e "${PURPLE}========================================${NC}"
          
          # Restore dari backup sebelumnya jika ada
          restore_from_backup
          
          # Start bots
          start_all_bots
          
          # Start Cloudflare Tunnel
          echo "Starting Cloudflare Tunnel..."
          ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 &
          TUNNEL_PID=$!
          echo $TUNNEL_PID > ~/tunnel_pid.txt
          echo "Tunnel PID: $TUNNEL_PID"
          
          # Start timing
          START_TIME=$(date +%s)
          RESTART_COUNT=0
          
          # Baca restart count dari state sebelumnya
          if [ -f ~/workflow_state.txt ]; then
            PREV_RESTART=$(grep "Restart count:" ~/workflow_state.txt | awk '{print $3}')
            if [ -n "$PREV_RESTART" ]; then
              RESTART_COUNT=$PREV_RESTART
            fi
          fi
          
          echo ""
          echo -e "${GREEN}=== SYSTEM RUNNING ON 3.7 GHz VPS ===${NC}"
          echo "CPU: Intel Xeon Platinum 8380 @ 3.70GHz"
          echo "Cores: 128 Core / 256 Threads"
          echo "RAM: 256 GB DDR5 ECC"
          echo "Storage: 10 TB NVMe SSD (Samsung PM1735)"
          echo "Storage Speed: 7,000 MB/s Read | 5,000 MB/s Write"
          echo "Auto-Restart: Every 5 hours 59 minutes"
          echo "Backup: Before each restart"
          echo "Start time: $(date)"
          echo "Initial PID: $$"
          echo "Restart count: $RESTART_COUNT"
          echo ""
          
          # Main loop
          while true; do
            sleep 60
            
            CURRENT_TIME=$(date +%s)
            ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
            REMAINING_TIME=$((RESTART_INTERVAL - ELAPSED_TIME))
            
            # Check if it's time to restart (5:59 hours)
            if [ $ELAPSED_TIME -ge $RESTART_INTERVAL ]; then
              echo ""
              echo -e "${PURPLE}========================================${NC}"
              echo -e "${YELLOW}[$(date)] AUTO-RESTART TRIGGERED${NC}"
              echo -e "${PURPLE}========================================${NC}"
              echo "Uptime: $((ELAPSED_TIME / 3600))h $(((ELAPSED_TIME % 3600) / 60))m"
              echo "Restart count: $((RESTART_COUNT + 1))"
              echo "VPS: 3.7 GHz - 128 Cores - 10TB Storage"
              echo ""
              
              # Trigger workflow baru
              trigger_new_workflow
              
              # Graceful shutdown setelah trigger
              graceful_shutdown
              
              # Exit dengan kode sukses, workflow baru akan mengambil alih
              echo -e "${GREEN}[$(date)] Handing over to new workflow...${NC}"
              echo "Exiting current workflow..."
              exit 0
              
            else
              # Check if bots are still running
              ALL_ALIVE=true
              if [ -f ~/bot_pids.txt ]; then
                BOT_PIDS=$(cat ~/bot_pids.txt)
                for PID in $BOT_PIDS; do
                  if ! kill -0 $PID 2>/dev/null; then
                    echo -e "${RED}[WARNING] Bot PID $PID died!${NC}"
                    ALL_ALIVE=false
                  fi
                done
              fi
              
              # If any bot died, restart all
              if [ "$ALL_ALIVE" = false ]; then
                echo -e "${YELLOW}Bot(s) died, restarting all bots...${NC}"
                # Kill all current bots
                if [ -f ~/bot_pids.txt ]; then
                  BOT_PIDS=$(cat ~/bot_pids.txt)
                  for PID in $BOT_PIDS; do
                    kill -9 $PID 2>/dev/null || true
                  done
                fi
                sleep 2
                start_all_bots
              fi
              
              # Check tunnel
              if [ -f ~/tunnel_pid.txt ]; then
                TUNNEL_PID=$(cat ~/tunnel_pid.txt)
                if ! kill -0 $TUNNEL_PID 2>/dev/null; then
                  echo "Tunnel died, restarting..."
                  ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 &
                  echo $! > ~/tunnel_pid.txt
                  echo "Tunnel restarted"
                fi
              fi
              
              # Show status every 5 minutes with VPS specs
              if [ $((ELAPSED_TIME % 300)) -lt 60 ]; then
                HOURS=$((ELAPSED_TIME / 3600))
                MINUTES=$(((ELAPSED_TIME % 3600) / 60))
                REMAINING_HOURS=$((REMAINING_TIME / 3600))
                REMAINING_MINUTES=$(((REMAINING_TIME % 3600) / 60))
                
                echo ""
                echo -e "${PURPLE}=== STATUS UPDATE - 3.7 GHz VPS ===${NC}"
                echo "CPU: Intel Xeon Platinum 8380 @ 3.70GHz"
                echo "Cores: 128 (256 Threads)"
                echo "RAM: 256 GB DDR5 ECC"
                echo "Storage: 10 TB NVMe SSD"
                echo "Uptime: ${HOURS}h ${MINUTES}m"
                echo "Next restart: ${REMAINING_HOURS}h ${REMAINING_MINUTES}m"
                echo "Restarts: $RESTART_COUNT"
                echo "Backups: $(ls -d $STORAGE_PATH/backup_* 2>/dev/null | wc -l)"
                echo "Bots running: $(cat ~/bot_pids.txt 2>/dev/null | wc -w)"
                echo "Time: $(date)"
                echo ""
              fi
            fi
          done
          BOTSYSTEM
          
          chmod +x bot_system.sh
          
      - name: Download Cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          
      - name: Run Bot System with 5:59 Hour Auto-Restart
        run: |
          echo "=== STARTING MULTI BOT SYSTEM 24/7 ==="
          echo "🚀 VPS: Intel Xeon Platinum 8380 @ 3.70GHz"
          echo "💻 Cores: 128 Core / 256 Threads"
          echo "💾 RAM: 256 GB DDR5 ECC"
          echo "💿 Storage: 10 TB NVMe SSD (Samsung PM1735)"
          echo "⚡ Speed: 7,000 MB/s Read | 5,000 MB/s Write"
          echo "Auto-Restart: Every 5 Hours 59 Minutes"
          echo "New workflow will be triggered at restart"
          echo "Data backup before each restart"
          echo ""
          
          # Run bot system
          ./bot_system.sh
          
      - name: Keep Workflow Alive
        run: |
          # This keeps the workflow running if bot_system.sh exits unexpectedly
          while true; do
            sleep 300
            echo "[$(date)] Workflow still running on 3.7 GHz VPS - 10TB Storage"
            echo "Next restart in: $(($(date +%s) % 21540))s"
            
            # Check if system is running
            if ! pgrep -f "bot_system.sh" > /dev/null; then
              echo "WARNING: Bot system died! Restarting..."
              ./bot_system.sh &
            fi
          done
