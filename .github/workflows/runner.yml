name: Bot 24/7 UNLIMITED LIMITS - MULTI BOT

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 999999999
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Large Storage
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /swapfile2 2>/dev/null || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=1500 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=1000 status=progress
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          sudo sysctl vm.swappiness=5
          sudo sysctl vm.vfs_cache_pressure=30
          sudo sysctl vm.dirty_ratio=15
          sudo sysctl vm.dirty_background_ratio=5
          sudo docker system prune -af 2>/dev/null || true
          sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
          sudo mkdir -p /mnt/extrastorage
          sudo mount -t tmpfs -o size=8G tmpfs /mnt/extrastorage
          echo "=== Storage Configuration ==="
          df -h
          free -h
          
      - name: Setup SSH Server with Persistent Access
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server net-tools
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#Port 22/Port 22/' /etc/ssh/sshd_config
          sudo sed -i 's/^#ListenAddress 0.0.0.0/ListenAddress 0.0.0.0/' /etc/ssh/sshd_config
          echo "UseDNS no" | sudo tee -a /etc/ssh/sshd_config
          echo "GSSAPIAuthentication no" | sudo tee -a /etc/ssh/sshd_config
          echo "MaxSessions 100" | sudo tee -a /etc/ssh/sshd_config
          echo "MaxStartups 100:30:200" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null
          
      - name: Display SSH Access Info
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          ROOT_PASSWORD=$(openssl rand -base64 32 | head -c 20)
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          echo ""
          echo "=========================================="
          echo "  MULTI BOT MODE - ALL ZIP WILL RUN"
          echo "  SSH: ACTIVE"
          echo "=========================================="
          echo ""
          echo "SSH Access:"
          echo "IP: $PUBLIC_IP"
          echo "Port: 22"
          echo "User: root"
          echo "Password: $ROOT_PASSWORD"
          echo ""
          echo "ssh root@$PUBLIC_IP"
          echo ""
          echo "$PUBLIC_IP" > ~/ssh_ip.txt
          echo "$ROOT_PASSWORD" > ~/ssh_pass.txt
          
      - name: Unzip ALL Files to Separate Folders
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              folder_name="${zipfile%.zip}"
              echo "Extracting $zipfile to $folder_name/"
              mkdir -p "$folder_name"
              unzip -o "$zipfile" -d "$folder_name"
              rm -f "$zipfile"
            fi
          done 2>/dev/null || true
          
          echo ""
          echo "=== All bots extracted ==="
          ls -la */
          
      # ============ BUILD APK ANDROID DARI FLUTTER PROJECT ============
      - name: Setup Android SDK for APK Building
        run: |
          echo "=== Setting up Android SDK ==="
          
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip curl git openjdk-17-jdk
          
          # Install Android SDK ke lokasi standar
          export ANDROID_HOME=/usr/local/android-sdk
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export GRADLE_USER_HOME=$HOME/.gradle
          
          sudo mkdir -p $ANDROID_HOME
          sudo chown -R $USER:$USER $ANDROID_HOME
          
          cd $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          
          # Setup directory structure yang benar
          mkdir -p cmdline-tools
          mv cmdline-tools cmdline-tools/temp
          mv cmdline-tools/temp cmdline-tools/latest
          
          # Setup environment
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          
          # Accept licenses dan install SDK components
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-33" \
            "build-tools;34.0.0" \
            "build-tools;33.0.2" \
            "cmdline-tools;latest" > /dev/null 2>&1

      - name: Install Flutter with Error Handling
        run: |
          echo "=== Installing Flutter ==="
          
          # Install Flutter ke lokasi standar
          FLUTTER_HOME=/opt/flutter
          sudo mkdir -p $FLUTTER_HOME
          sudo chown -R $USER:$USER $FLUTTER_HOME
          
          # Clone Flutter stable
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git $FLUTTER_HOME
          
          # Setup PATH
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH
          echo "FLUTTER_HOME=$FLUTTER_HOME" >> $GITHUB_ENV
          
          # Run flutter doctor untuk setup awal
          $FLUTTER_HOME/bin/flutter doctor -v
          
          # Precache untuk Android
          $FLUTTER_HOME/bin/flutter precache

      - name: Fix Common Flutter Issues
        run: |
          echo "=== Fixing common Flutter build issues ==="
          
          # Fix gradle wrapper permission
          find . -name "gradlew" -exec chmod +x {} \; 2>/dev/null || true
          
          # Fix Android SDK location
          export ANDROID_HOME=/usr/local/android-sdk
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export GRADLE_USER_HOME=$HOME/.gradle
          
          # Create local.properties untuk setiap Flutter project
          for project_dir in */; do
            if [ -f "${project_dir}pubspec.yaml" ] && [ -d "${project_dir}android" ]; then
              echo "Creating local.properties for ${project_dir}"
              echo "sdk.dir=$ANDROID_HOME" > "${project_dir}android/local.properties"
            fi
          done

      - name: Verify Flutter Project Structure
        run: |
          echo "=== Verifying Flutter project structure ==="
          
          # Debug: tampilkan semua folder yang ada
          echo "All folders in workspace:"
          ls -la
          
          # Loop semua folder untuk cek struktur Flutter
          for project_dir in */; do
            echo ""
            echo "Checking: $project_dir"
            
            # Cek pubspec.yaml
            if [ -f "${project_dir}pubspec.yaml" ]; then
              echo "  âœ… Has pubspec.yaml"
            else
              echo "  âŒ No pubspec.yaml - not a Flutter project"
              continue
            fi
            
            # Cek folder android
            if [ -d "${project_dir}android" ]; then
              echo "  âœ… Has android folder"
              
              # Cek struktur android folder
              if [ -f "${project_dir}android/app/build.gradle" ]; then
                echo "  âœ… Has android/app/build.gradle"
              else
                echo "  âš ï¸ Missing android/app/build.gradle"
              fi
              
              if [ -f "${project_dir}android/gradle/wrapper/gradle-wrapper.properties" ]; then
                echo "  âœ… Has gradle wrapper"
              else
                echo "  âš ï¸ Missing gradle wrapper"
              fi
              
              # Tampilkan isi android folder
              echo "  Contents of android folder:"
              ls -la "${project_dir}android/" | head -10
              
            else
              echo "  âŒ No android folder - cannot build APK"
              echo "  This Flutter project may be web-only or missing Android support"
              
              # Coba cek apakah ini Flutter module atau package
              if [ -f "${project_dir}pubspec.yaml" ]; then
                if grep -q "flutter:" "${project_dir}pubspec.yaml"; then
                  echo "  âš ï¸ This is a Flutter project but missing android/ folder"
                  echo "  Run: flutter create --platforms=android ."
                fi
              fi
            fi
            
            # Cek lib folder
            if [ -d "${project_dir}lib" ]; then
              echo "  âœ… Has lib folder"
              MAIN_DART=$(find "${project_dir}lib" -name "main.dart" | head -1)
              if [ -n "$MAIN_DART" ]; then
                echo "  âœ… Found main.dart at: $MAIN_DART"
              fi
            fi
          done
          
      - name: Generate Missing Android Folder for Flutter Projects
        run: |
          echo "=== Generating missing android folders ==="
          
          export ANDROID_HOME=/usr/local/android-sdk
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export GRADLE_USER_HOME=$HOME/.gradle
          
          for project_dir in */; do
            # Cek apakah Flutter project tapi tidak ada android folder
            if [ -f "${project_dir}pubspec.yaml" ] && [ ! -d "${project_dir}android" ]; then
              echo ""
              echo "ðŸ“± Generating android folder for: $project_dir"
              
              cd "$project_dir"
              
              # Create android platform
              echo "  Running: flutter create --platforms=android ."
              /opt/flutter/bin/flutter create --platforms=android . 2>&1 | tail -20
              
              # Cek hasil
              if [ -d "android" ]; then
                echo "  âœ… Android folder created successfully"
                
                # Buat local.properties
                echo "sdk.dir=$ANDROID_HOME" > android/local.properties
                echo "  âœ… local.properties created"
                
                # Fix gradle wrapper
                chmod +x android/gradlew 2>/dev/null || true
              else
                echo "  âŒ Failed to create android folder"
              fi
              
              cd ..
            fi
          done
          
      - name: Fix Gradle and Android Build Files
        run: |
          echo "=== Fixing Gradle and Android build files ==="
          
          export ANDROID_HOME=/usr/local/android-sdk
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export GRADLE_USER_HOME=$HOME/.gradle
          
          for project_dir in */; do
            if [ -f "${project_dir}pubspec.yaml" ] && [ -d "${project_dir}android" ]; then
              echo ""
              echo "ðŸ”§ Fixing: $project_dir"
              
              cd "$project_dir"
              
              # Fix 1: Update gradle wrapper properties
              if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
                # Update gradle distribution URL
                sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-7.5-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
                echo "  âœ… Updated gradle-wrapper.properties"
              fi
              
              # Fix 2: Update build.gradle untuk kompatibilitas
              if [ -f "android/app/build.gradle" ]; then
                # Update minSdkVersion jika terlalu rendah
                sed -i 's/minSdkVersion [0-9]\+/minSdkVersion 21/' android/app/build.gradle
                sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 34/' android/app/build.gradle
                sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 34/' android/app/build.gradle
                echo "  âœ… Updated app/build.gradle"
              fi
              
              # Fix 3: Update root build.gradle
              if [ -f "android/build.gradle" ]; then
                # Tambahkan repositories jika diperlukan
                if ! grep -q "mavenCentral" android/build.gradle; then
                  sed -i '/repositories {/a \        mavenCentral()' android/build.gradle
                fi
                echo "  âœ… Updated root build.gradle"
              fi
              
              # Fix 4: Buat file properties lagi untuk memastikan
              echo "sdk.dir=$ANDROID_HOME" > android/local.properties
              
              # Fix 5: Fix permission gradlew
              chmod +x android/gradlew 2>/dev/null || true
              
              cd ..
            fi
          done

      - name: Build APK for Each Flutter Project
        run: |
          echo "=== Building APK for Flutter projects ==="
          
          export ANDROID_HOME=/usr/local/android-sdk
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export GRADLE_USER_HOME=$HOME/.gradle
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          mkdir -p built_apks
          
          BUILD_FAILED=""
          BUILD_SUCCESS=""
          SKIPPED_COUNT=0
          
          # Loop semua folder
          for project_dir in */; do
            # Validasi ketat untuk Flutter project yang bisa di-build APK
            IS_FLUTTER=false
            HAS_ANDROID=false
            
            # Cek pubspec.yaml
            if [ -f "${project_dir}pubspec.yaml" ]; then
              IS_FLUTTER=true
            fi
            
            # Cek android folder
            if [ -d "${project_dir}android" ]; then
              HAS_ANDROID=true
            fi
            
            # Hanya build jika Flutter project DAN punya android folder
            if [ "$IS_FLUTTER" = true ] && [ "$HAS_ANDROID" = true ]; then
              echo ""
              echo "========================================="
              echo "ðŸ“± Building Flutter APK: $project_dir"
              echo "========================================="
              
              cd "$project_dir"
              
              # Tampilkan info project
              echo "ðŸ“Œ Project info:"
              echo "   - Pubspec.yaml: âœ…"
              echo "   - Android folder: âœ…"
              echo "   - Android SDK: $ANDROID_HOME"
              
              # Clean project
              echo "ðŸ§¹ Cleaning project..."
              /opt/flutter/bin/flutter clean 2>/dev/null || true
              
              # Get packages
              echo "ðŸ“¦ Getting packages..."
              /opt/flutter/bin/flutter pub get
              
              # Build APK
              echo "ðŸ”¨ Building APK..."
              
              # Try building dengan berbagai opsi
              BUILD_SUCCESS_FLAG=false
              
              # Coba release build
              if /opt/flutter/bin/flutter build apk --release --no-tree-shake-icons; then
                # Cek hasil build
                if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
                  APK_NAME="${project_dir%/}_release.apk"
                  cp "build/app/outputs/flutter-apk/app-release.apk" "../built_apks/$APK_NAME"
                  echo "âœ… APK built: $APK_NAME"
                  BUILD_SUCCESS_FLAG=true
                  BUILD_SUCCESS="$BUILD_SUCCESS $APK_NAME"
                elif [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
                  APK_NAME="${project_dir%/}_release.apk"
                  cp "build/app/outputs/apk/release/app-release.apk" "../built_apks/$APK_NAME"
                  echo "âœ… APK built: $APK_NAME"
                  BUILD_SUCCESS_FLAG=true
                  BUILD_SUCCESS="$BUILD_SUCCESS $APK_NAME"
                fi
              fi
              
              # Jika release gagal, coba debug
              if [ "$BUILD_SUCCESS_FLAG" = false ]; then
                echo "âš ï¸ Release build failed, trying debug build..."
                if /opt/flutter/bin/flutter build apk --debug; then
                  if [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
                    APK_NAME="${project_dir%/}_debug.apk"
                    cp "build/app/outputs/flutter-apk/app-debug.apk" "../built_apks/$APK_NAME"
                    echo "âœ… Debug APK built: $APK_NAME"
                    BUILD_SUCCESS_FLAG=true
                    BUILD_SUCCESS="$BUILD_SUCCESS $APK_NAME"
                  fi
                fi
              fi
              
              if [ "$BUILD_SUCCESS_FLAG" = false ]; then
                echo "âŒ Build failed for $project_dir"
                BUILD_FAILED="$BUILD_FAILED $project_dir"
              fi
              
              cd ..
            elif [ "$IS_FLUTTER" = true ] && [ "$HAS_ANDROID" = false ]; then
              echo ""
              echo "âš ï¸ SKIPPING: $project_dir - Flutter project but no android folder"
              echo "   This project may be web-only or needs 'flutter create --platforms=android .'"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
            else
              echo "[SKIP] $project_dir - Not a Flutter project"
            fi
          done
          
          echo ""
          echo "========================================="
          echo "=== APK BUILD SUMMARY ==="
          echo "========================================="
          echo "âœ… Successful builds: $BUILD_SUCCESS"
          if [ -n "$BUILD_FAILED" ]; then
            echo "âŒ Failed builds: $BUILD_FAILED"
          fi
          if [ $SKIPPED_COUNT -gt 0 ]; then
            echo "âš ï¸ Skipped (no android folder): $SKIPPED_COUNT project(s)"
          fi
          echo ""
          echo "=== APK files generated ==="
          ls -lh built_apks/ 2>/dev/null || echo "No APKs built"

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apks
          path: built_apks/
          retention-days: 7
          if-no-files-found: warn
          
      # ============ CONTINUE WITH ORIGINAL BOT SETUP ============
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ALL Dependencies from package.json
        run: |
          echo "=== Installing dependencies from package.json ==="
          
          # Install global tools
          npm install -g pm2
          
          # Loop semua folder dan install dari package.json jika ada
          for bot_dir in */; do
            # Skip Flutter projects
            if [ -f "${bot_dir}pubspec.yaml" ]; then
              echo "[SKIP] ${bot_dir} is Flutter project, skipping npm install"
              continue
            fi
            
            if [ -f "${bot_dir}package.json" ]; then
              echo ""
              echo ">>> Found package.json in: ${bot_dir}"
              cd "$bot_dir"
              
              # Install dependencies dari package.json
              echo "  Installing dependencies from package.json..."
              npm install --no-audit --no-fund || {
                echo "  Warning: npm install failed, trying with --legacy-peer-deps"
                npm install --legacy-peer-deps --no-audit --no-fund || true
              }
              
              cd ..
            elif [ -f "${bot_dir}index.js" ] || [ -f "${bot_dir}app.js" ] || [ -f "${bot_dir}main.js" ]; then
              echo ""
              echo ">>> No package.json in ${bot_dir}, creating and installing common deps"
              cd "$bot_dir"
              
              # Buat package.json kalo ga ada
              npm init -y
              
              # Install dependencies yang paling umum dipake
              npm install express axios cheerio puppeteer puppeteer-extra puppeteer-extra-plugin-stealth --no-audit --no-fund || true
              npm install socket.io ws discord.js telegraf node-fetch --no-audit --no-fund || true
              npm install request got superagent --no-audit --no-fund || true
              npm install moment chalk colors figlet --no-audit --no-fund || true
              npm install dotenv config winston --no-audit --no-fund || true
              npm install fs-extra path os child_process --no-audit --no-fund || true
              npm install crypto crypto-js jsonwebtoken bcrypt --no-audit --no-fund || true
              npm install qrcode sharp jimp --no-audit --no-fund || true
              npm install mongoose mysql2 sqlite3 redis --no-audit --no-fund || true
              npm install compression helmet cors body-parser --no-audit --no-fund || true
              npm install express-session cookie-parser morgan --no-audit --no-fund || true
              npm install nodemailer multer cloudinary --no-audit --no-fund || true
              
              cd ..
            fi
          done
          
          echo ""
          echo "=== All dependencies installed ==="
          
      - name: Detect and Setup Node.js Versions per Bot
        run: |
          echo "=== Detecting Node.js requirements per bot ==="
          
          # Simpan requirement tiap bot
          for bot_dir in */; do
            # Skip Flutter projects
            if [ -f "${bot_dir}pubspec.yaml" ]; then
              continue
            fi
            
            if [ -f "${bot_dir}package.json" ]; then
              cd "$bot_dir"
              
              # Baca engines.node dari package.json
              NODE_REQ=$(node -p "try{require('./package.json').engines?.node || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$NODE_REQ" ]; then
                echo "${bot_dir} requires: $NODE_REQ"
                echo "$bot_dir|$NODE_REQ" >> ../node_requirements.txt
              else
                echo "${bot_dir} no specific node version required"
              fi
              
              # Baca main file dari package.json
              MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$MAIN_FILE" ] && [ -f "$MAIN_FILE" ]; then
                echo "${bot_dir}|$MAIN_FILE" >> ../bot_main_files.txt
              fi
              
              cd ..
            fi
          done
          
          echo ""
          echo "=== Node.js requirements detected ==="
          cat node_requirements.txt 2>/dev/null || echo "No specific requirements"
          
      - name: Create Fake Device Module (Global)
        run: |
          cat > fake-device.js << 'FAKEJS'
          module.exports = {
            getDeviceInfo: () => ({
              model: process.env.BUILD_MODEL || "SM-S918B",
              manufacturer: process.env.BUILD_MANUFACTURER || "samsung",
              androidVersion: process.env.BUILD_VERSION_RELEASE || "14"
            }),
            getIMEI: () => process.env.FAKE_IMEI || "35" + Math.random().toString(36).substring(2, 15),
            getMAC: () => process.env.FAKE_MAC || "02:" + Array(5).fill().map(() => Math.random().toString(16).slice(-2)).join(":"),
            getLocation: () => ({
              latitude: parseFloat(process.env.FAKE_LATITUDE) || -6.2 + Math.random() * 5,
              longitude: parseFloat(process.env.FAKE_LONGITUDE) || 106.8 + Math.random() * 5
            }),
            getUserAgent: () => {
              const uas = [
                "Mozilla/5.0 (Linux; Android 14; SM-S918B) AppleWebKit/537.36 Chrome/120.0.6099.210 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 13; SM-G998B) AppleWebKit/537.36 Chrome/119.0.6045.163 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro) AppleWebKit/537.36 Chrome/121.0.6167.164 Mobile Safari/537.36"
              ];
              return uas[Math.floor(Math.random() * uas.length)];
            },
            getAllFakeData: () => ({
              device: module.exports.getDeviceInfo(),
              imei: module.exports.getIMEI(),
              mac: module.exports.getMAC(),
              location: module.exports.getLocation(),
              userAgent: module.exports.getUserAgent(),
              timestamp: Date.now()
            })
          };
          FAKEJS
          
      - name: Download Cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          
      - name: Run ALL Bots Simultaneously with package.json Detection
        run: |
          export NODE_OPTIONS="--max-old-space-size=12288"
          unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
          unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
          
          echo "=== Starting ALL Bots (using package.json) ==="
          echo ""
          
          # Setup fake device environment
          cat > fake_device.sh << 'DEVICE'
          #!/bin/bash
          export ANDROID_ID=$(openssl rand -hex 16)
          export DEVICE_ID=$(openssl rand -hex 8)
          export GAID=$(openssl rand -hex 16)
          export BUILD_MODEL="SM-S918B"
          export BUILD_MANUFACTURER="samsung"
          export BUILD_VERSION_RELEASE="14"
          export BUILD_VERSION_SDK_INT="34"
          DEVICE
          chmod +x fake_device.sh
          source fake_device.sh
          
          # Simpan semua PID
          PIDS=""
          BOT_COUNT=0
          
          # Loop semua folder yang ada package.json atau file js
          for bot_dir in */; do
            # Skip folder yang merupakan Flutter project (pubspec.yaml)
            if [ -f "${bot_dir}pubspec.yaml" ]; then
              echo "[SKIP] ${bot_dir} is Flutter project, not running as Node.js bot"
              continue
            fi
            
            # Cek main file dari package.json dulu
            MAIN_FILE=""
            
            if [ -f "${bot_dir}package.json" ]; then
              cd "$bot_dir"
              # Baca main dari package.json
              MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$MAIN_FILE" ] && [ -f "$MAIN_FILE" ]; then
                echo "  Using main from package.json: $MAIN_FILE"
              else
                # Fallback ke file biasa
                if [ -f "index.js" ]; then
                  MAIN_FILE="index.js"
                elif [ -f "app.js" ]; then
                  MAIN_FILE="app.js"
                elif [ -f "main.js" ]; then
                  MAIN_FILE="main.js"
                fi
              fi
              cd ..
            else
              # Fallback ke file biasa
              if [ -f "${bot_dir}index.js" ]; then
                MAIN_FILE="index.js"
              elif [ -f "${bot_dir}app.js" ]; then
                MAIN_FILE="app.js"
              elif [ -f "${bot_dir}main.js" ]; then
                MAIN_FILE="main.js"
              fi
            fi
            
            if [ -n "$MAIN_FILE" ]; then
