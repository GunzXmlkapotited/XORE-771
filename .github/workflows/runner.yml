name: BOT 24/7 WITH DATA PERSISTENCE

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'
    - cron: '8 */1 * * *'

concurrency:
  group: bot-247
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 359
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Large Storage
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /swapfile2 2>/dev/null || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=500 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo dd if=/dev/zero of=/swapfile2 bs=1M count=500 status=progress
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          sudo sysctl vm.swappiness=5
          sudo sysctl vm.vfs_cache_pressure=30
          sudo sysctl vm.dirty_ratio=15
          sudo sysctl vm.dirty_background_ratio=5
          sudo docker system prune -af 2>/dev/null || true
          sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null || true
          sudo mkdir -p /mnt/extrastorage
          sudo mount -t tmpfs -o size=8G tmpfs /mnt/extrastorage
          echo "=== Storage Configuration ==="
          df -h
          free -h
          
      - name: Download Previous Data from Artifact
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: bot-247.yml
          branch: main
          name: bot-saved-data
          path: ./restored-data
          if_no_artifact_found: warn
          
      - name: Download Previous Data from Gist Backup
        continue-on-error: true
        run: |
          echo "=== TRYING TO RESTORE FROM GIST BACKUP ==="
          GIST_ID="YOUR_GIST_ID_HERE"
          GIST_TOKEN="${{ secrets.GIST_TOKEN }}"
          
          if [ -n "$GIST_TOKEN" ] && [ -n "$GIST_ID" ]; then
            curl -s -H "Authorization: token $GIST_TOKEN" \
              "https://api.github.com/gists/$GIST_ID" > gist_data.json
            
            if [ -f "gist_data.json" ]; then
              cat gist_data.json | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['files']['bot-backup.json']['content'])" 2>/dev/null | base64 -d 2>/dev/null | tar -xzv 2>/dev/null && echo "✅ Restored from Gist" || echo "⚠️ No valid Gist backup"
            fi
          else
            echo "⚠️ Gist backup not configured (no GIST_TOKEN or GIST_ID)"
          fi
          
      - name: Restore Data from Downloaded Artifact
        run: |
          echo "=== RESTORING PREVIOUS DATA ==="
          
          if [ -f "./restored-data/bot-data-backup.tar.gz" ]; then
            echo "Found backup artifact, restoring..."
            tar -xzf ./restored-data/bot-data-backup.tar.gz -C ./
            echo "✅ Data restored successfully from artifact!"
            echo ""
            echo "Restored files:"
            tar -tzf ./restored-data/bot-data-backup.tar.gz 2>/dev/null | head -30
          elif [ -f "./restored-data/data-backup.tar.gz" ]; then
            echo "Found old format backup, restoring..."
            tar -xzf ./restored-data/data-backup.tar.gz -C ./
            echo "✅ Old format data restored"
          else
            echo "⚠️ No previous data found - Starting fresh"
          fi
          
          echo ""
          echo "=== CURRENT DATA FILES ==="
          echo "Database files:"
          find . -name "*.db" -o -name "*.sqlite" 2>/dev/null | head -10
          echo ""
          echo "Session folders:"
          find . -type d -name "session*" -o -name "sessions" -o -name "cache" -o -name "storage" 2>/dev/null | head -10
          echo ""
          echo "JSON data files:"
          find . -name "*.json" -not -path "./node_modules/*" -not -name "package*.json" 2>/dev/null | head -10
          
      - name: Setup SSH Server with Persistent Access
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server net-tools
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#Port 22/Port 22/' /etc/ssh/sshd_config
          sudo sed -i 's/^#ListenAddress 0.0.0.0/ListenAddress 0.0.0.0/' /etc/ssh/sshd_config
          echo "UseDNS no" | sudo tee -a /etc/ssh/sshd_config
          echo "GSSAPIAuthentication no" | sudo tee -a /etc/ssh/sshd_config
          echo "MaxSessions 100" | sudo tee -a /etc/ssh/sshd_config
          echo "MaxStartups 100:30:200" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null
          
      - name: Display SSH Access Info
        run: |
          PUBLIC_IP=$(curl -s https://api.ipify.org)
          ROOT_PASSWORD=$(openssl rand -base64 32 | head -c 20)
          echo "root:$ROOT_PASSWORD" | sudo chpasswd
          echo ""
          echo "=========================================="
          echo "  MULTI BOT MODE - ALL ZIP WILL RUN"
          echo "  SSH: ACTIVE"
          echo "=========================================="
          echo ""
          echo "SSH Access:"
          echo "IP: $PUBLIC_IP"
          echo "Port: 22"
          echo "User: root"
          echo "Password: $ROOT_PASSWORD"
          echo ""
          echo "ssh root@$PUBLIC_IP"
          echo ""
          echo "$PUBLIC_IP" > ~/ssh_ip.txt
          echo "$ROOT_PASSWORD" > ~/ssh_pass.txt
          
      - name: Unzip ALL Files to Separate Folders
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              folder_name="${zipfile%.zip}"
              echo "Extracting $zipfile to $folder_name/"
              mkdir -p "$folder_name"
              unzip -o "$zipfile" -d "$folder_name"
              rm -f "$zipfile"
            fi
          done 2>/dev/null || true
          
          echo ""
          echo "=== All bots extracted ==="
          ls -la */ 2>/dev/null | head -50
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ALL Dependencies from package.json
        run: |
          echo "=== Installing dependencies from package.json ==="
          
          npm install -g pm2
          
          for bot_dir in */; do
            if [ -f "${bot_dir}package.json" ]; then
              echo ""
              echo ">>> Found package.json in: ${bot_dir}"
              cd "$bot_dir"
              
              NODE_VERSION=$(node -p "try{require('./package.json').engines?.node || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$NODE_VERSION" ]; then
                echo "  Required Node.js version: $NODE_VERSION"
              fi
              
              echo "  Installing dependencies from package.json..."
              npm install --no-audit --no-fund || {
                echo "  Warning: npm install failed, trying with --legacy-peer-deps"
                npm install --legacy-peer-deps --no-audit --no-fund || true
              }
              
              cd ..
            elif [ -f "${bot_dir}index.js" ] || [ -f "${bot_dir}app.js" ] || [ -f "${bot_dir}main.js" ]; then
              echo ""
              echo ">>> No package.json in ${bot_dir}, creating and installing common deps"
              cd "$bot_dir"
              
              npm init -y
              
              npm install express axios cheerio puppeteer puppeteer-extra puppeteer-extra-plugin-stealth --no-audit --no-fund || true
              npm install socket.io ws discord.js telegraf node-fetch --no-audit --no-fund || true
              npm install request got superagent --no-audit --no-fund || true
              npm install moment chalk colors figlet --no-audit --no-fund || true
              npm install dotenv config winston --no-audit --no-fund || true
              npm install fs-extra path os child_process --no-audit --no-fund || true
              npm install crypto crypto-js jsonwebtoken bcrypt --no-audit --no-fund || true
              npm install qrcode sharp jimp --no-audit --no-fund || true
              npm install mongoose mysql2 sqlite3 redis --no-audit --no-fund || true
              npm install compression helmet cors body-parser --no-audit --no-fund || true
              npm install express-session cookie-parser morgan --no-audit --no-fund || true
              npm install nodemailer multer cloudinary --no-audit --no-fund || true
              
              cd ..
            fi
          done
          
          echo ""
          echo "=== All dependencies installed ==="
          
      - name: Detect and Setup Node.js Versions per Bot
        run: |
          echo "=== Detecting Node.js requirements per bot ==="
          
          for bot_dir in */; do
            if [ -f "${bot_dir}package.json" ]; then
              cd "$bot_dir"
              
              NODE_REQ=$(node -p "try{require('./package.json').engines?.node || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$NODE_REQ" ]; then
                echo "${bot_dir} requires: $NODE_REQ"
                echo "$bot_dir|$NODE_REQ" >> ../node_requirements.txt
              else
                echo "${bot_dir} no specific node version required"
              fi
              
              MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$MAIN_FILE" ] && [ -f "$MAIN_FILE" ]; then
                echo "${bot_dir}|$MAIN_FILE" >> ../bot_main_files.txt
              fi
              
              cd ..
            fi
          done
          
          echo ""
          echo "=== Node.js requirements detected ==="
          cat node_requirements.txt 2>/dev/null || echo "No specific requirements"
          
      - name: Create Fake Device Module (Global)
        run: |
          cat > fake-device.js << 'FAKEJS'
          module.exports = {
            getDeviceInfo: () => ({
              model: process.env.BUILD_MODEL || "SM-S918B",
              manufacturer: process.env.BUILD_MANUFACTURER || "samsung",
              androidVersion: process.env.BUILD_VERSION_RELEASE || "14"
            }),
            getIMEI: () => process.env.FAKE_IMEI || "35" + Math.random().toString(36).substring(2, 15),
            getMAC: () => process.env.FAKE_MAC || "02:" + Array(5).fill().map(() => Math.random().toString(16).slice(-2)).join(":"),
            getLocation: () => ({
              latitude: parseFloat(process.env.FAKE_LATITUDE) || -6.2 + Math.random() * 5,
              longitude: parseFloat(process.env.FAKE_LONGITUDE) || 106.8 + Math.random() * 5
            }),
            getUserAgent: () => {
              const uas = [
                "Mozilla/5.0 (Linux; Android 14; SM-S918B) AppleWebKit/537.36 Chrome/120.0.6099.210 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 13; SM-G998B) AppleWebKit/537.36 Chrome/119.0.6045.163 Mobile Safari/537.36",
                "Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro) AppleWebKit/537.36 Chrome/121.0.6167.164 Mobile Safari/537.36"
              ];
              return uas[Math.floor(Math.random() * uas.length)];
            },
            getAllFakeData: () => ({
              device: module.exports.getDeviceInfo(),
              imei: module.exports.getIMEI(),
              mac: module.exports.getMAC(),
              location: module.exports.getLocation(),
              userAgent: module.exports.getUserAgent(),
              timestamp: Date.now()
            })
          };
          FAKEJS
          
      - name: Download Cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          
      - name: Run ALL Bots Simultaneously with Auto Data Save Every Hour
        run: |
          export NODE_OPTIONS="--max-old-space-size=12288"
          unset CI GITHUB_ACTIONS GITHUB_RUN_ID GITHUB_ACTION GITHUB_ACTOR
          unset GITHUB_REPOSITORY GITHUB_EVENT_NAME GITHUB_WORKFLOW
          
          echo "=== Starting ALL Bots (using package.json) ==="
          echo ""
          
          cat > fake_device.sh << 'DEVICE'
          #!/bin/bash
          export ANDROID_ID=$(openssl rand -hex 16)
          export DEVICE_ID=$(openssl rand -hex 8)
          export GAID=$(openssl rand -hex 16)
          export BUILD_MODEL="SM-S918B"
          export BUILD_MANUFACTURER="samsung"
          export BUILD_VERSION_RELEASE="14"
          export BUILD_VERSION_SDK_INT="34"
          DEVICE
          chmod +x fake_device.sh
          source fake_device.sh
          
          PIDS=""
          BOT_COUNT=0
          
          for bot_dir in */; do
            MAIN_FILE=""
            
            if [ -f "${bot_dir}package.json" ]; then
              cd "$bot_dir"
              MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
              if [ -n "$MAIN_FILE" ] && [ -f "$MAIN_FILE" ]; then
                echo "  Using main from package.json: $MAIN_FILE"
              else
                if [ -f "index.js" ]; then
                  MAIN_FILE="index.js"
                elif [ -f "app.js" ]; then
                  MAIN_FILE="app.js"
                elif [ -f "main.js" ]; then
                  MAIN_FILE="main.js"
                fi
              fi
              cd ..
            else
              if [ -f "${bot_dir}index.js" ]; then
                MAIN_FILE="index.js"
              elif [ -f "${bot_dir}app.js" ]; then
                MAIN_FILE="app.js"
              elif [ -f "${bot_dir}main.js" ]; then
                MAIN_FILE="main.js"
              fi
            fi
            
            if [ -n "$MAIN_FILE" ]; then
              BOT_COUNT=$((BOT_COUNT + 1))
              
              export ANDROID_ID=$(openssl rand -hex 16)
              export GAID=$(openssl rand -hex 16)
              export FAKE_IMEI="35$(openssl rand -hex 12 | head -c 13)"
              export FAKE_MAC="02:$(openssl rand -hex 6 | sed 's/\(..\)/\1:/g' | cut -d: -f1-5):$(openssl rand -hex 2 | head -c 2)"
              export FAKE_LATITUDE="-$((RANDOM % 90)).$((RANDOM % 999999))"
              export FAKE_LONGITUDE="$((RANDOM % 180)).$((RANDOM % 999999))"
              
              echo "[BOT $BOT_COUNT] Starting: ${bot_dir} - $MAIN_FILE"
              echo "  IMEI: $FAKE_IMEI"
              echo "  MAC: $FAKE_MAC"
              
              if [ -f "${bot_dir}package.json" ]; then
                cd "$bot_dir"
                START_SCRIPT=$(node -p "try{require('./package.json').scripts?.start || ''}catch(e){''}" 2>/dev/null)
                if [ -n "$START_SCRIPT" ] && [ "$START_SCRIPT" != "node $MAIN_FILE" ]; then
                  echo "  Using npm start script: $START_SCRIPT"
                  npm start &
                  PID=$!
                else
                  node -r ../fake-device.js "$MAIN_FILE" &
                  PID=$!
                fi
                cd ..
              else
                cd "$bot_dir"
                node -r ../fake-device.js "$MAIN_FILE" &
                PID=$!
                cd ..
              fi
              
              PIDS="$PIDS $PID"
            fi
          done
          
          echo ""
          echo "=== Total Bots Running: $BOT_COUNT ==="
          echo "PIDs: $PIDS"
          echo ""
          
          ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 &
          TUNNEL_PID=$!
          
          echo "Tunnel PID: $TUNNEL_PID"
          echo ""
          echo "SSH Active on: $(cat ~/ssh_ip.txt 2>/dev/null)"
          echo ""
          echo "=== Monitoring All Bots with Auto Backup Every Hour ==="
          
          LAST_BACKUP=$(date +%s)
          
          while true; do
            sleep 60
            
            CURRENT_TIME=$(date +%s)
            TIME_SINCE_BACKUP=$((CURRENT_TIME - LAST_BACKUP))
            
            if [ $TIME_SINCE_BACKUP -ge 3600 ]; then
              echo ""
              echo "[$(date)] ⏰ Running scheduled backup..."
              
              mkdir -p /tmp/backup_$$
              find . -name "*.db" -o -name "*.sqlite" -o -type d -name "session*" -o -type d -name "sessions" -o -name "*.log" -o -name "*.json" -not -path "./node_modules/*" -not -name "package*.json" 2>/dev/null | xargs -I {} cp --parents {} /tmp/backup_$$/ 2>/dev/null
              
              tar -czf /tmp/hourly-backup.tar.gz -C /tmp/backup_$$ . 2>/dev/null
              
              if [ -f /tmp/hourly-backup.tar.gz ]; then
                cp /tmp/hourly-backup.tar.gz ./hourly-backup.tar.gz
                echo "✅ Hourly backup saved: $(du -h ./hourly-backup.tar.gz | cut -f1)"
              fi
              
              rm -rf /tmp/backup_$$
              LAST_BACKUP=$CURRENT_TIME
            fi
            
            ALL_ALIVE=true
            for PID in $PIDS; do
              if ! kill -0 $PID 2>/dev/null; then
                echo "[WARNING] Bot PID $PID died!"
                ALL_ALIVE=false
              fi
            done
            
            if ! kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "Tunnel died, restarting..."
              ./cloudflared tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiZjE5ZGViYTItYTI2My00YTExLWE1YjktYTRlNGE1MzA4NTJlIiwicyI6Ik1tVXlZak01TlRrdE16SmtNUzAwWXpOaExUbGpOamN0WVdWbFlUVTFaR0V4TVdRNSJ9 &
              TUNNEL_PID=$!
            fi
            
            if [ "$ALL_ALIVE" = false ]; then
              echo "Restarting all bots..."
              for PID in $PIDS; do
                kill $PID 2>/dev/null
              done
              
              sleep 5
              
              NEW_PIDS=""
              for bot_dir in */; do
                MAIN_FILE=""
                if [ -f "${bot_dir}package.json" ]; then
                  cd "$bot_dir"
                  MAIN_FILE=$(node -p "try{require('./package.json').main || ''}catch(e){''}" 2>/dev/null)
                  if [ -z "$MAIN_FILE" ] || [ ! -f "$MAIN_FILE" ]; then
                    if [ -f "index.js" ]; then
                      MAIN_FILE="index.js"
                    elif [ -f "app.js" ]; then
                      MAIN_FILE="app.js"
                    elif [ -f "main.js" ]; then
                      MAIN_FILE="main.js"
                    fi
                  fi
                  cd ..
                else
                  if [ -f "${bot_dir}index.js" ]; then
                    MAIN_FILE="index.js"
                  elif [ -f "${bot_dir}app.js" ]; then
                    MAIN_FILE="app.js"
                  elif [ -f "${bot_dir}main.js" ]; then
                    MAIN_FILE="main.js"
                  fi
                fi
                
                if [ -n "$MAIN_FILE" ]; then
                  export ANDROID_ID=$(openssl rand -hex 16)
                  export GAID=$(openssl rand -hex 16)
                  export FAKE_IMEI="35$(openssl rand -hex 12 | head -c 13)"
                  
                  cd "$bot_dir"
                  node -r ../fake-device.js "$MAIN_FILE" &
                  NEW_PIDS="$NEW_PIDS $!"
                  cd ..
                fi
              done
              PIDS="$NEW_PIDS"
              echo "All bots restarted. New PIDs: $PIDS"
            fi
            
            echo "[$(date)] 🟢 Alive: Bots=$(echo $PIDS | wc -w) | Tunnel=$TUNNEL_PID | Next backup in $((3600 - TIME_SINCE_BACKUP))s"
          done
          
      - name: Save ALL Data for Next Workflow
        if: always()
        run: |
          echo ""
          echo "=== SAVING ALL DATA FOR NEXT WORKFLOW ==="
          echo ""
          
          BACKUP_FILE="bot-data-backup.tar.gz"
          
          echo "Collecting data files..."
          
          DB_FILES=$(find . -name "*.db" -o -name "*.sqlite" -o -name "*.sqlite3" 2>/dev/null)
          SESSION_DIRS=$(find . -type d -name "session*" -o -name "sessions" -o -name "cache" -o -name "storage" -o -name "temp" -o -name "data" 2>/dev/null)
          JSON_FILES=$(find . -name "*.json" -not -path "./node_modules/*" -not -name "package*.json" -not -name "package-lock.json" 2>/dev/null)
          LOG_FILES=$(find . -name "*.log" 2>/dev/null)
          CONFIG_FILES=$(find . -name ".env" -o -name "*.config.js" -o -name "config.json" -o -name "config.yaml" 2>/dev/null)
          TXT_FILES=$(find . -name "*.txt" -not -path "./node_modules/*" 2>/dev/null)
          
          ALL_FILES="$DB_FILES $SESSION_DIRS $JSON_FILES $LOG_FILES $CONFIG_FILES $TXT_FILES"
          
          if [ -n "$ALL_FILES" ]; then
            echo "Found files to backup:"
            echo "$ALL_FILES" | head -30
            echo ""
            
            tar -czf $BACKUP_FILE $ALL_FILES 2>/dev/null || true
            
            if [ -f "$BACKUP_FILE" ]; then
              BACKUP_SIZE=$(du -h $BACKUP_FILE | cut -f1)
              FILE_COUNT=$(tar -tzf $BACKUP_FILE 2>/dev/null | wc -l)
              echo "✅ Backup created successfully!"
              echo "   File: $BACKUP_FILE"
              echo "   Size: $BACKUP_SIZE"
              echo "   Files: $FILE_COUNT"
            else
              echo "⚠️ Failed to create backup archive"
              touch $BACKUP_FILE
            fi
          else
            echo "⚠️ No data files found to backup"
            touch $BACKUP_FILE
          fi
          
          echo ""
          echo "=== Saving hourly backup if exists ==="
          if [ -f "./hourly-backup.tar.gz" ]; then
            cp ./hourly-backup.tar.gz hourly-backup-${{ github.run_id }}.tar.gz
            echo "✅ Hourly backup saved"
          fi
          
      - name: Upload to Gist Backup
        if: always() && secrets.GIST_TOKEN != ''
        continue-on-error: true
        run: |
          echo "=== UPLOADING TO GIST BACKUP ==="
          
          GIST_ID="YOUR_GIST_ID_HERE"
          GIST_TOKEN="${{ secrets.GIST_TOKEN }}"
          
          if [ -n "$GIST_TOKEN" ] && [ -n "$GIST_ID" ] && [ -f "bot-data-backup.tar.gz" ]; then
            BACKUP_BASE64=$(base64 -w 0 bot-data-backup.tar.gz 2>/dev/null)
            
            if [ -n "$BACKUP_BASE64" ]; then
              cat > gist_payload.json << EOF
              {
                "files": {
                  "bot-backup.json": {
                    "content": "$BACKUP_BASE64"
                  },
                  "backup-metadata.json": {
                    "content": "{\"timestamp\":\"$(date -Iseconds)\",\"run_id\":${{ github.run_id }},\"size\":\"$(du -h bot-data-backup.tar.gz | cut -f1)\",\"workflow\":\"bot-247\"}"
                  }
                }
              }
              EOF
              
              curl -s -X PATCH \
                -H "Authorization: token $GIST_TOKEN" \
                -H "Content-Type: application/json" \
                -d @gist_payload.json \
                "https://api.github.com/gists/$GIST_ID"
              
              echo "✅ Backup uploaded to Gist"
            fi
          else
            echo "⚠️ Gist backup skipped (no token or gist id)"
          fi
          
      - name: Upload Artifact for Next Workflow
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-saved-data
          path: |
            bot-data-backup.tar.gz
            hourly-backup-*.tar.gz
          retention-days: 1
          overwrite: true
          
      - name: Trigger Next Workflow Automatically
        if: always()
        continue-on-error: true
        run: |
          echo "=== TRIGGERING NEXT WORKFLOW ==="
          
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot-247.yml/dispatches" \
            -d '{"ref":"main"}'
          
          echo "✅ Next workflow triggered successfully!"
          
      - name: Final Status
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "  WORKFLOW COMPLETED"
          echo "========================================="
          echo ""
          echo "Status: ${{ job.status }}"
          echo "Data saved for next run: ✅"
          echo "Next workflow triggered: ✅"
          echo ""
          echo "SSH IP: $(cat ~/ssh_ip.txt 2>/dev/null || echo 'N/A')"
          echo "SSH Pass: $(cat ~/ssh_pass.txt 2>/dev/null || echo 'N/A')"
          echo ""
          echo "Backup file:"
          ls -lh bot-data-backup.tar.gz 2>/dev/null || echo "No backup file"
          echo ""
